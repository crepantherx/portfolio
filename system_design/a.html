<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>100 System Design Interview Questions & Detailed Answers</title>
  <style>

      --surface: #1e293b;

      --text2: #b0bec5;

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

      color: var(--text);
      line-height: 1.7;

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {

    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);

    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;

  <script>
    const questions = [
      // ==================== FUNDAMENTALS & ARCHITECTURE (1-10) ====================
      {
        id: 1,
        cat: 'Fundamentals',
        q: 'What are the key differences between monolithic and microservices architecture? When would you choose one over the other?',
        a: `A <strong>monolithic</strong> architecture bundles all components (UI, business logic, data access) into a single deployable unit. A <strong>microservices</strong> architecture splits these into independently deployable services communicating over the network.<br><br>
            <span class="highlight">Monolith pros:</span> simpler development & debugging, single deployment, lower latency (in-process calls), easier transaction management. <span class="highlight">Cons:</span> scaling requires scaling the entire app, tight coupling, large codebase becomes unwieldy, technology lock-in.<br><br>
            <span class="highlight">Microservices pros:</span> independent scaling per service, polyglot technology choices, smaller codebases per team, fault isolation, faster parallel development. <span class="highlight">Cons:</span> network latency, distributed transaction complexity, operational overhead (orchestration, monitoring), data consistency challenges.<br><br>
            <strong>When to choose:</strong> Start with a monolith for MVPs and small teams (<20 engineers). Migrate to microservices when you have clear domain boundaries, multiple teams needing independent velocity, or specific services requiring radically different scaling characteristics (e.g., a CPU-bound ML service vs. an I/O-bound API).`
      },
      {
        id: 2,
        cat: 'Fundamentals',
        q: 'Explain the CAP theorem. How does it apply when designing a distributed database system?',
        a: `The <strong>CAP theorem</strong> (Brewer's theorem) states that a distributed data store can simultaneously provide only two of three guarantees: <span class="highlight">Consistency</span> (all nodes see the same data at the same time), <span class="highlight">Availability</span> (every request receives a non-error response), and <span class="highlight">Partition Tolerance</span> (the system continues operating despite network partitions).<br><br>
            Since network partitions are inevitable in distributed systems, the real choice is between <strong>CP</strong> (consistency + partition tolerance, sacrificing availability during partitions — e.g., HBase, Zookeeper) and <strong>AP</strong> (availability + partition tolerance, sacrificing strong consistency — e.g., Cassandra, DynamoDB with eventual consistency).<br><br>
            <strong>Practical application:</strong> For banking/ledger systems, choose CP — you'd rather reject a transaction than double-spend. For social media feeds or CDN metadata, choose AP — stale data is acceptable if the system stays responsive. Many modern systems offer <em>tunable consistency</em> (e.g., Cosmos DB, Cassandra with configurable consistency levels) so you can dial the trade-off per operation.`
      },
      {
        id: 3,
        cat: 'Fundamentals',
        q: 'What is the difference between vertical scaling and horizontal scaling? Give real-world examples.',
        a: `<strong>Vertical scaling (scale-up)</strong> means adding more resources (CPU, RAM, SSD) to a single machine. <strong>Horizontal scaling (scale-out)</strong> means adding more machines/nodes to a cluster.<br><br>
            <span class="highlight">Vertical scaling:</span> Simpler — no code changes, no distributed system complexity. Limited by hardware ceilings (max RAM per server, single CPU socket limits). Single point of failure. Example: upgrading a PostgreSQL primary from 64GB to 512GB RAM to handle a growing dataset that still fits on one machine. Works well for databases with strong consistency needs.<br><br>
            <span class="highlight">Horizontal scaling:</span> Theoretically unlimited scaling. Requires data partitioning (sharding), load balancing, and handling distributed consistency. Example: Netflix runs thousands of microservice instances across AWS, each handling a fraction of traffic. Cassandra and Elasticsearch scale horizontally by design — add nodes, data auto-rebalances.<br><br>
            <strong>In practice:</strong> Most systems start vertical, then go horizontal when they hit limits. Cloud makes horizontal scaling easier with auto-scaling groups and managed services.`
      },
      {
        id: 4,
        cat: 'Fundamentals',
        q: 'What is the difference between strong consistency, eventual consistency, and causal consistency?',
        a: `<strong>Strong consistency:</strong> After a write completes, all subsequent reads return the updated value. Every replica reflects the write before acknowledging it. Achieved via synchronous replication (e.g., Paxos/Raft consensus). Cost: higher latency, reduced availability during partitions. Used in Google Spanner, etcd.<br><br>
            <strong>Eventual consistency:</strong> If no new writes occur, eventually all replicas converge to the same value. Writes may be visible on some replicas before others. Much lower latency, higher availability. Used in DNS, Amazon DynamoDB (default), Cassandra (tunable). The <em>eventual</em> part can be seconds or minutes.<br><br>
            <strong>Causal consistency:</strong> A middle ground — causally related writes are seen in the same order by all nodes. If operation A causally precedes B (e.g., A writes a post, B comments on it), everyone sees A before B. Concurrent writes may be seen in any order. Implemented via vector clocks or dependency tracking. Used in some social media feed systems where comment ordering relative to the post matters.`
      },
      {
        id: 5,
        cat: 'Fundamentals',
        q: 'How do you approach capacity planning for a new system expected to serve 10 million users?',
        a: `Start with <strong>back-of-the-envelope estimation</strong> using reasonable assumptions:<br><br>
            <span class="highlight">1. Traffic estimation:</span> Assume DAU (Daily Active Users) = 10M × 20% = 2M. If each user makes 20 requests/day, that's 40M requests/day ≈ <strong>~460 requests/second</strong> average. Peak may be 3× average = ~1,400 req/s.<br><br>
            <span class="highlight">2. Storage estimation:</span> If each user generates 5KB of data/day, daily ingestion = 2M × 5KB = 10GB/day. Over 3 years: ~11TB. With replication (3×) and indexes (2× overhead): ~66TB.<br><br>
            <span class="highlight">3. Bandwidth:</span> If average response size is 50KB, at 460 req/s = 23MB/s = ~184 Mbps. Peak: ~550 Mbps.<br><br>
            <span class="highlight">4. Server estimation:</span> If one server handles 500 req/s comfortably, need ~3 servers for average, ~9 for peak with headroom. Add redundancy (N+1): ~12 servers.<br><br>
            <span class="highlight">5. Database:</span> Use these numbers to determine shard count, connection pool sizes, and whether read replicas are needed. Always factor in growth headroom (30-50%). Build monitoring dashboards to validate assumptions post-launch.`
      },
      {
        id: 6,
        cat: 'Fundamentals',
        q: 'What is the difference between synchronous and asynchronous communication between services? When to use each?',
        a: `<strong>Synchronous communication:</strong> The caller waits for the response before proceeding. Typically HTTP/REST or gRPC. Simple to reason about, but introduces temporal coupling — if the callee is slow or down, the caller blocks and may cascade failures.<br><br>
            <strong>Asynchronous communication:</strong> The caller sends a message and continues without waiting. Typically via message queues (Kafka, RabbitMQ, SQS) or event streams. Decouples services temporally — the callee can be down temporarily without affecting the caller's availability.<br><br>
            <span class="highlight">Use synchronous when:</span> The caller <em>needs</em> an immediate response to proceed (e.g., payment authorization, user login validation). Low-latency requirements. Simple workflows.<br><br>
            <span class="highlight">Use asynchronous when:</span> The operation can be processed later (e.g., sending welcome emails, generating reports, video transcoding). You need high resilience. You're building event-driven architectures where multiple services react to the same event. <strong>Hybrid:</strong> Many systems use sync for the "happy path" with async fallbacks (circuit breakers + queues).`
      },
      {
        id: 7,
        cat: 'Fundamentals',
        q: 'Explain the concept of idempotency and why it is crucial in distributed systems.',
        a: `<strong>Idempotency</strong> means that performing the same operation multiple times produces the same result as performing it once. In HTTP, PUT and DELETE are idempotent; POST is not.<br><br>
            In distributed systems, idempotency is <strong>critical</strong> because: (1) Network retries — a client may resend a request after a timeout even though the server already processed it. (2) At-least-once delivery semantics in message queues. (3) Distributed transactions where compensating actions may replay.<br><br>
            <span class="highlight">Implementation strategies:</span> Use <strong>idempotency keys</strong> — the client generates a unique key per operation, the server stores processed keys (with TTL) and returns cached results for duplicates. Stripe's API is a classic example. For database operations, use <em>INSERT IF NOT EXISTS</em> with unique constraints, or optimistic locking with version numbers. Design state machines where transitions are idempotent (e.g., "set status to 'shipped'" instead of "increment shipment count").`
      },
      {
        id: 8,
        cat: 'Fundamentals',
        q: 'What are the most important non-functional requirements (NFRs) to consider in system design?',
        a: `Key NFRs that shape architecture decisions:<br><br>
            <span class="highlight">1. Scalability:</span> Can the system handle 10× growth? Vertical vs. horizontal scaling strategy. Elasticity for burst handling.<br>
            <span class="highlight">2. Availability:</span> Uptime target (99.9% = ~8.7h downtime/year; 99.999% = ~5 min/year). Requires redundancy, failover, graceful degradation.<br>
            <span class="highlight">3. Reliability:</span> The system produces correct results even under adverse conditions. Includes data durability (no lost writes).<br>
            <span class="highlight">4. Performance/Latency:</span> P50, P95, P99 response times. Affects user experience and SEO. CDN, caching, and async processing help.<br>
            <span class="highlight">5. Consistency:</span> How stale can data be? Strong vs. eventual vs. causal. Ties to CAP theorem choices.<br>
            <span class="highlight">6. Security:</span> Authentication, authorization, encryption at rest & in transit, DDoS protection, input sanitization.<br>
            <span class="highlight">7. Maintainability:</span> How easy is it to debug, deploy, and modify? Observability (logs, metrics, traces) is key.<br>
            <span class="highlight">8. Cost:</span> Infrastructure budget constraints. Trade-offs between managed services vs. self-hosted, reserved vs. on-demand instances.<br>
            <span class="highlight">9. Compliance:</span> GDPR, HIPAA, PCI-DSS may dictate data locality, encryption, and audit trail requirements.`
      },
      {
        id: 9,
        cat: 'Fundamentals',
        q: 'What is a load balancer? Compare Layer 4 vs Layer 7 load balancing with real use cases.',
        a: `A <strong>load balancer</strong> distributes incoming traffic across multiple backend servers to improve availability, scalability, and reliability.<br><br>
            <span class="highlight">Layer 4 (Transport — TCP/UDP):</span> Operates at the network transport layer. Routes based on IP address and port. Cannot inspect HTTP headers, cookies, or URL paths. Very fast — minimal overhead, no SSL termination needed at the LB. Use cases: TCP-based protocols (MySQL, Redis, WebSockets), simple round-robin distribution, when you need maximum throughput with minimal latency.<br><br>
            <span class="highlight">Layer 7 (Application — HTTP/HTTPS):</span> Operates at the application layer. Can inspect HTTP headers, cookies, URL paths, and body content. Enables: <strong>sticky sessions</strong> (cookie-based), <strong>content-based routing</strong> (/api/v2 → new backend, /images → image servers), <strong>SSL termination</strong> (offloads TLS to LB), <strong>rate limiting</strong>, <strong>request rewriting</strong>, and <strong>WAF</strong> integration. Use cases: microservices API gateways, A/B testing, canary deployments, any HTTP-based service. AWS ALB, Nginx, HAProxy, and Envoy are common L7 LBs.`
      },
      {
        id: 10,
        cat: 'Fundamentals',
        q: 'Explain the difference between a reverse proxy and a forward proxy. Give examples.',
        a: `A <strong>forward proxy</strong> sits between clients and the internet. Clients configure the proxy explicitly. It masks client identities, bypasses geo-restrictions, caches web content, and enforces corporate browsing policies. Examples: Squid proxy, corporate VPN gateways, Tor exit nodes. The server doesn't know the original client.<br><br>
            A <strong>reverse proxy</strong> sits between the internet and backend servers. Clients think they're talking to the actual server, but the proxy forwards requests to backends. It masks server identities, provides SSL termination, load balancing, caching, compression, and DDoS protection. Examples: Nginx, Cloudflare, AWS ALB, HAProxy. The client doesn't know which backend served the request.<br><br>
            <strong>Key distinction:</strong> Forward proxy = client-side anonymity/control. Reverse proxy = server-side protection/optimization. In system design, reverse proxies are ubiquitous — almost every modern web service has Nginx or a cloud LB as a reverse proxy in front of app servers.`
      },

      // ==================== SCALABILITY & LOAD HANDLING (11-20) ====================
      {
        id: 11,
        cat: 'Scalability',
        q: 'How do you handle a very high occasional service demand surge (e.g., flash sales, ticket launches)?',
        a: `Flash sales create <strong>100× to 1000× traffic spikes</strong> in seconds. A multi-layered approach is essential:<br><br>
            <span class="highlight">1. Pre-warming:</span> Scale up infrastructure before the event. Pre-warm caches with product data, user sessions, and static assets. Coordinate with cloud providers for reserved capacity.<br>
            <span class="highlight">2. Queue-based throttling:</span> Use a <strong>virtual waiting room</strong> (e.g., Queue-it). Users get a queue token; only N users enter the actual shopping flow at a time. This flattens the spike.<br>
            <span class="highlight">3. Static/Dynamic separation:</span> Serve product pages from CDN cache with short TTL. Only the "add to cart" and "checkout" actions hit dynamic servers. Use <strong>inventory reservation</strong> — reserve stock for users in the checkout flow with a short timeout (e.g., 5 min) rather than real-time inventory checks.<br>
            <span class="highlight">4. Rate limiting & circuit breakers:</span> Aggressive rate limiting at the API gateway. Circuit breakers prevent cascading failures if downstream services (payment, inventory) get overloaded.<br>
            <span class="highlight">5. Eventual inventory:</span> Accept that inventory counts may be slightly stale during the surge. Use Redis with Lua scripts for atomic decrement operations — extremely fast, eventually sync to the DB. Over-selling is prevented by final reconciliation.`
      },
      {
        id: 12,
        cat: 'Scalability',
        q: 'How would you design a rate limiter for an API serving millions of requests?',
        a: `A distributed rate limiter needs to be <strong>fast</strong> (minimal latency added), <strong>accurate</strong> (prevent abuse), and <strong>scalable</strong>.<br><br>
            <span class="highlight">Algorithm choices:</span> <strong>Token Bucket</strong> (allows bursts, good for most APIs), <strong>Leaky Bucket</strong> (smooths traffic, fixed outflow rate), <strong>Fixed Window</strong> (simple but has edge-boundary burst issues), <strong>Sliding Window Log</strong> (accurate but memory-heavy), <strong>Sliding Window Counter</strong> (best balance — approximate with low memory).<br><br>
            <span class="highlight">Architecture:</span> Use Redis as the distributed counter store. Each request does: <code>INCR user:123:window</code> + <code>EXPIRE</code>. Redis is single-threaded and atomic, perfect for this. For very high throughput, use <strong>local rate limiting</strong> (in-memory in each API instance) for coarse-grained limits + Redis for precise global limits. This reduces Redis calls by 90%+.<br><br>

        q: 'How do you handle database migrations with zero downtime in a live production system?',
        a: `Zero-downtime migrations require an <strong>expand-contract pattern</strong> (also called parallel change or blue-green schema evolution):<br><br>
            <span class="highlight">Phase 1 — Expand (additive only):</span> Add new columns/tables but never remove or rename existing ones. New columns must be nullable or have defaults. Deploy this schema change <em>without</em> changing application code yet. The app continues reading/writing the old schema; the new columns sit empty.<br>
            <span class="highlight">Phase 2 — Dual-write application:</span> Deploy application code that writes to <em>both</em> old and new columns. Reads still use old columns. This ensures new columns get populated for all new data.<br>
            <span class="highlight">Phase 3 — Backfill:</span> Run a background job to populate new columns for existing rows (in batches, during low-traffic hours, with throttling to avoid DB overload).<br>
            <span class="highlight">Phase 4 — Switch reads:</span> Deploy code that reads from new columns. Old columns are still written (for rollback safety). Monitor for issues.<br>
            <span class="highlight">Phase 5 — Contract (cleanup):</span> After confirming everything works, deploy code that stops writing/reading old columns. Then drop old columns in a separate schema change.<br><br>

        a: `<strong>Pessimistic locking:</strong> Locks the row/resource before reading it, preventing other transactions from modifying it until the lock is released. Implemented via <code>SELECT ... FOR UPDATE</code>. <strong>Pros:</strong> Guarantees consistency — no conflict possible. <strong>Cons:</strong> Reduces concurrency, can cause deadlocks, doesn't scale well across microservices.<br><br>
            <strong>Optimistic locking:</strong> Reads the row with a version number, performs the update, and checks that the version hasn't changed (<code>UPDATE ... WHERE version = old_version</code>). If 0 rows updated, the transaction conflicted and must retry. <strong>Pros:</strong> High concurrency, no lock overhead, works across distributed systems. <strong>Cons:</strong> Retries waste work under high contention; not suitable when conflicts are frequent.<br><br>
            <span class="highlight">When to use:</span> Use <strong>pessimistic locking</strong> when conflicts are likely (e.g., booking the last concert ticket — high contention on a single row) and transaction duration is short. Use <strong>optimistic locking</strong> when conflicts are rare (e.g., editing a user profile — unlikely two people edit simultaneously) and scalability matters. In microservices, optimistic locking with version vectors is preferred because distributed locks are expensive and risky.`

            <strong>Change Data Capture (CDC):</strong> A pattern that uses the WAL (or triggers) to detect and propagate data changes to external systems in near-real-time. CDC tools (Debezium, AWS DMS, Kafka Connect) read the WAL, parse row-level changes, and publish them as events to Kafka or other sinks. This enables: cache invalidation, search index updates, data warehouse ETL, audit logging, and cross-service data sync without dual-writes.<br><br>
            <span class="highlight">Key difference:</span> WAL is an <strong>internal database mechanism</strong> for durability and replication. CDC is an <strong>application-level pattern</strong> that leverages the WAL to build event-driven architectures. CDC decouples data producers (the DB) from consumers (other services), avoiding the tight coupling of application-level dual-writes.`

            <strong>Max pool size:</strong> The maximum number of connections. Setting it too high overwhelms the DB (each connection consumes DB memory and CPU for idle maintenance). Formula: <code>max_pool_size = (DB_max_connections - 20) / number_of_app_instances</code>. For PostgreSQL, a good starting point is 20-50 per app instance.<br>

        a: `<strong>Leader-Follower (Primary-Replica) Replication:</strong> One leader (primary) accepts all writes. Followers (replicas) replicate the leader's data and serve read queries. Writes are propagated via <strong>synchronous</strong> or <strong>asynchronous</strong> replication.<br><br>
            <span class="highlight">Synchronous replication:</span> The leader waits for at least one follower to acknowledge the write before confirming to the client. <strong>Pros:</strong> Guaranteed consistency — if the leader fails, a follower has the latest data. <strong>Cons:</strong> Higher write latency, reduced availability (if no follower is reachable, writes fail).<br>
            <span class="highlight">Asynchronous replication:</span> The leader confirms writes immediately; followers catch up later. <strong>Pros:</strong> Low write latency, high availability. <strong>Cons:</strong> <strong>Replication lag</strong> — followers may return stale data. If the leader crashes, un-replicated writes may be lost.<br><br>
            <span class="highlight">Consistency trade-offs:</span> Reading from replicas introduces <strong>eventual consistency</strong>. A user may write data, then read from a replica that hasn't caught up yet. Mitigations: (1) Use <strong>read-your-writes consistency</strong> — route reads for recently modified data to the leader. (2) Use <strong>monotonic reads</strong> — ensure a user always reads from the same replica (sticky sessions). (3) Critical reads always go to the leader. <strong>Multi-leader</strong> and <strong>leaderless</strong> (Dynamo-style) replication offer different trade-offs for global deployments.`

            <span class="highlight">How it works:</span> During indexing, text is <strong>tokenized</strong> (split into words), <strong>normalized</strong> (lowercased, stemmed — "running" → "run"), and <strong>filtered</strong> (stop words like "the" removed). Each unique term gets a <strong>posting list</strong> — a sorted list of document IDs where the term appears, often with term frequency and position offsets.<br><br>
            <span class="highlight">Query execution:</span> A search for "quick brown fox" looks up posting lists for each term and performs <strong>intersection</strong> (AND) or <strong>union</strong> (OR). Position information enables phrase queries ("quick brown" adjacent). TF-IDF or BM25 scoring ranks results by relevance. Elasticsearch uses <strong>Apache Lucene</strong> under the hood, which stores inverted indexes per <strong>segment</strong> (immutable mini-index). Segments are merged periodically for optimization.<br><br>
            <span class="highlight">Why it's fast:</span> Instead of scanning every document (O(n)), inverted index lookup is O(1) for term → posting list, then O(m) where m is the number of matching documents — orders of magnitude faster for large text corpora.`

            <strong>LSM-Tree (Log-Structured Merge-Tree, used in RocksDB, Cassandra, LevelDB):</strong> Writes are appended to an in-memory memtable (fast sequential write). When the memtable fills, it's flushed to disk as an immutable <strong>SSTable</strong> (sorted string table). Reads must check the memtable + multiple SSTables (potentially slower). Background <strong>compaction</strong> merges SSTables, removing duplicates and deleted entries. Best for <strong>write-heavy workloads</strong> — sequential writes are much faster than random writes on HDDs and even SSDs.<br><br>
            <span class="highlight">Trade-offs:</span> B-Trees excel at read performance and support efficient in-place updates. LSM-Trees excel at write throughput but suffer from <strong>write amplification</strong> (data rewritten during compaction) and <strong>read amplification</strong> (checking multiple files). Choose B-Tree for OLTP with balanced read/write; choose LSM-Tree for time-series data, logging, or high-ingestion event streams.`

      // ==================== CACHING (31-40) ====================
      {
        id: 31,
        cat: 'Caching',
        q: 'What are the different caching strategies (cache-aside, read-through, write-through, write-behind)? Compare them.',
        a: `<strong>1. Cache-Aside (Lazy Loading):</strong> App checks cache first. On miss, app fetches from DB and populates cache. <strong>Pros:</strong> Simple, cache only contains what's actually requested. <strong>Cons:</strong> Cache misses incur DB hit + cache write latency. Stale data possible. Most common pattern.<br><br>
            <strong>2. Read-Through:</strong> Cache sits between app and DB. On miss, cache itself fetches from DB, populates itself, and returns to app. App code is simpler (always talks to cache). <strong>Pros:</strong> Consistent read path. <strong>Cons:</strong> First read is slow; cache plugin must understand DB schema.<br><br>
            <strong>3. Write-Through:</strong> App writes to cache; cache synchronously writes to DB. <strong>Pros:</strong> Cache always consistent with DB. <strong>Cons:</strong> Higher write latency (two writes). Use for data that must never be stale.<br><br>
            <strong>4. Write-Behind (Write-Back):</strong> App writes to cache; cache acknowledges immediately and <em>asynchronously</em> writes to DB later. <strong>Pros:</strong> Lowest write latency, can batch writes to DB. <strong>Cons:</strong> Risk of data loss if cache crashes before flushing to DB. Use for high-throughput write scenarios where slight data loss is tolerable (e.g., page view counters).<br><br>

        a: `A <strong>saga</strong> is a sequence of local transactions where each transaction updates a single service's database and publishes an event triggering the next step. If any step fails, the saga executes <strong>compensating transactions</strong> to undo the preceding steps. Sagas provide eventual consistency without distributed (2PC) transactions.<br><br>
            <span class="highlight">Two implementation approaches:</span><br>
            <strong>1. Choreography (Event-driven):</strong> Each service listens for events and performs its local transaction, then emits the next event. No central coordinator. <strong>Pros:</strong> Decoupled, simple to implement initially. <strong>Cons:</strong> Hard to understand the full flow, cyclic dependencies risk, testing complexity. Example: Order Service emits <code>OrderPlaced</code> → Payment Service listens, charges, emits <code>PaymentCaptured</code> → Inventory Service listens, reserves stock.<br>
            <strong>2. Orchestration (Command-driven):</strong> A central <strong>saga orchestrator</strong> sends commands to each service and listens for responses. It manages the state machine of the saga. <strong>Pros:</strong> Explicit workflow, easier to reason about, centralized error handling. <strong>Cons:</strong> Orchestrator becomes a single point of coordination (though it can be made highly available). Example: Saga Orchestrator sends <code>ReserveInventory</code> command → waits for response → sends <code>ProcessPayment</code> → on failure, sends <code>ReleaseInventory</code> compensating command.<br><br>
            <span class="highlight">Key considerations:</span> Compensating transactions must be idempotent. The saga may leave the system in a transient inconsistent state (e.g., payment captured but inventory not yet reserved). This is acceptable for most business scenarios. Use <strong>semantic locks</strong> (e.g., mark order as "pending") to prevent conflicts during the saga.`

            <strong>3. Client-server architecture:</strong> Each client maintains a local copy and sends operations to the server via WebSocket. The server acts as the <strong>single source of truth</strong> — it applies operations in a consistent order, transforms incoming operations against already-applied ones, and broadcasts transformed operations to all clients.<br>

        a: `Large file uploads require <strong>chunked/resumable uploads</strong> to handle network interruptions and browser memory limits.<br><br>
            <span class="highlight">Chunked upload protocol:</span><br>
            <strong>1. Client-side chunking:</strong> Use the <code>File.slice()</code> API to split the file into chunks (e.g., 5-10MB each). Upload chunks sequentially or in parallel (3-5 concurrent chunks for speed). Each chunk is a separate HTTP request with metadata: <code>Content-Range</code>, <code>X-Upload-Id</code>, <code>X-Chunk-Index</code>.<br>
            <strong>2. Upload session:</strong> Initiate an upload session (<code>POST /uploads</code>) that returns a unique <code>upload_id</code>. This tracks the upload state. Store in Redis: <code>upload:{id} → {filename, total_chunks, uploaded_chunks: [1,2,3,...], status}</code>.<br>
            <strong>3. Resumability:</strong> If the connection drops, the client queries <code>GET /uploads/{id}/status</code> to see which chunks were received and resumes from the missing ones. No need to re-upload completed chunks.<br>
            <strong>4. Server-side assembly:</strong> Chunks are stored temporarily in object storage (S3) or local disk. After all chunks arrive, a background worker <strong>assembles</strong> them into the final file. For S3, use <strong>multipart upload</strong> — S3 handles chunk assembly natively.<br>
            <strong>5. Direct-to-cloud:</strong> For even better scalability, use <strong>pre-signed URLs</strong>. The client gets pre-signed S3 URLs for each chunk and uploads directly to S3, bypassing your servers entirely. After all chunks are uploaded, the client notifies your server which triggers final assembly via S3 CompleteMultipartUpload API.<br>

        q: 'What is object storage vs block storage vs file storage? When to use each?',
        a: `<strong>Block Storage (EBS, SAN):</strong> Raw storage volumes attached to a single VM/instance. Data is accessed in fixed-size blocks. <strong>Pros:</strong> Very low latency (sub-millisecond), high IOPS, supports any filesystem. <strong>Cons:</strong> Attached to a single instance (not natively shared), limited scalability. <strong>Use for:</strong> Database storage (PostgreSQL data directory), VM boot volumes, any low-latency random I/O workload.<br><br>
            <strong>File Storage (EFS, NFS, SMB):</strong> Hierarchical file system accessible over the network by multiple instances simultaneously. <strong>Pros:</strong> Familiar POSIX interface, shared across instances, good for legacy apps. <strong>Cons:</strong> Limited performance at scale, single-region, higher latency than block. <strong>Use for:</strong> Shared application files, home directories, content management systems with traditional file access patterns.<br><br>
            <strong>Object Storage (S3, GCS, Azure Blob):</strong> Flat namespace storing objects (files + metadata) accessible via HTTP API. <strong>Pros:</strong> Infinite scalability, 99.999999999% durability (11 9's), globally accessible, versioning, lifecycle policies, event notifications. <strong>Cons:</strong> Higher latency than block (tens of ms), no in-place modification (must rewrite entire object), eventual consistency for some operations. <strong>Use for:</strong> Static assets, backups, data lakes, media files, log archives, CDN origin — basically everything that isn't a database or live filesystem. <strong>This is the default choice for cloud-native apps.</strong>`

      {
        id: 65,
        cat: 'Storage',
        q: 'What is erasure coding and how does it compare to replication for data durability?',
        a: `<strong>Replication:</strong> Store N identical copies of data on different nodes. With 3× replication, you need 3TB of raw storage for 1TB of data. You can tolerate 2 simultaneous node failures. Simple, fast reads (any replica), but <strong>high storage overhead</strong> (200% for 3×).<br><br>
            <strong>Erasure Coding (EC):</strong> Split data into K data fragments, compute M parity fragments, store all K+M fragments across different nodes. Can reconstruct the original data from <em>any</em> K fragments. For Reed-Solomon (10,4): 10 data + 4 parity = 14 total fragments, 40% overhead, can tolerate 4 node failures. <strong>Pros:</strong> Much lower storage overhead (40-60% vs. 200%) for equivalent durability. <strong>Cons:</strong> Higher CPU for encoding/decoding, higher read latency (must fetch K fragments and reconstruct), more complex.<br><br>
            <span class="highlight">Use cases:</span> <strong>Replication</strong> for hot data requiring low-latency reads (database replicas, cache). <strong>Erasure coding</strong> for cold/archival data (S3 uses EC internally, Hadoop HDFS EC for archival storage, Backblaze uses 17+3 Reed-Solomon). Many systems use both — replication for recent data, EC for older data (tiered storage). MinIO and Ceph support EC for object storage.`
      },

            <span class="highlight">Video Processing Pipeline:</span><br>

            <strong>2. Transcoding:</strong> Async job that encodes the video into multiple <strong>bitrates and resolutions</strong>: 144p, 240p, 360p, 480p, 720p, 1080p, 4K. Each resolution has multiple bitrates (e.g., 720p at 1.5Mbps, 3Mbps, 5Mbps). Use codecs: H.264 (broad compatibility), H.265/HEVC (better compression), AV1 (royalty-free, best compression).<br>
            <strong>3. Segmentation:</strong> Each encoded stream is split into small <strong>segments</strong> (2-10 seconds each). This enables adaptive switching — the player can switch bitrates at segment boundaries based on network conditions.<br>
            <strong>4. Packaging:</strong> Create <strong>manifest files</strong> (HLS .m3u8 or DASH .mpd) listing all available bitrates and segment URLs. The player downloads the manifest and decides which segments to fetch.<br><br>
            <span class="highlight">Delivery:</span><br>
            <strong>5. CDN distribution:</strong> Video segments are pushed to CDN edge servers worldwide. Netflix's <strong>Open Connect</strong> places Netflix appliances inside ISP networks for even closer delivery.<br>
            <strong>6. Adaptive Bitrate (ABR):</strong> The player monitors buffer level and network speed. If the buffer is full and network is fast, it requests higher bitrate segments. If the buffer empties, it drops to lower bitrate. This prevents buffering stalls.<br>
            <strong>7. Pre-fetching & pre-warming:</strong> For popular content, proactively push segments to CDN edges. For Netflix, the next episode's first segments are pre-fetched during the credits.`

        cat: 'Storage',
        q: 'How does content deduplication work in backup and storage systems?',
        a: `Deduplication eliminates redundant copies of data, saving massive storage in backup systems.<br><br>
            <span class="highlight">Types:</span><br>
            <strong>1. File-level dedup:</strong> If two files have identical content, store only one copy. Simple but misses partial overlaps. Use hash comparison (SHA-256).<br>
            <strong>2. Block-level (chunk-level) dedup:</strong> Split data into fixed-size blocks (e.g., 4KB) or <strong>variable-size chunks</strong> (content-defined chunking using Rabin fingerprinting). Each chunk is hashed and stored uniquely. If two files share 80% of their chunks, only the unique 20% is stored additionally. This is how Dropbox and backup tools (Veeam, Borg) work — a small edit to a large file only stores the changed chunks.<br>
            <strong>3. Variable/Content-Defined Chunking:</strong> Use a rolling hash to determine chunk boundaries based on content, not fixed offsets. This makes dedup resilient to insertions/deletions — if you insert a paragraph in a document, only the chunks overlapping the change are new; the rest remain identical. Fixed-size chunking would see every subsequent block as different.<br><br>
            <span class="highlight">Implementation:</span> Maintain a <strong>chunk index</strong> (hash → storage location). On write, chunk the data, hash each chunk, check the index. New chunks are stored; existing chunks get a reference count increment. On delete, decrement reference counts; garbage-collect chunks with count=0. The chunk index must fit in memory or use a fast KV store (RocksDB) for performance.`
      },

        a: `A <strong>Bloom filter</strong> is a probabilistic data structure that answers: "Is this element in the set?" with possible false positives ("maybe yes") but <strong>no false negatives</strong> ("definitely no"). It uses a bit array and multiple hash functions. Adding an element sets K bits to 1. Checking an element: if all K bits are 1 → "maybe in set"; if any bit is 0 → "definitely not in set."<br><br>
            <span class="highlight">Why it's useful:</span> Bloom filters are <strong>extremely memory efficient</strong> — you can represent millions of keys in a few megabytes. False positive rate is configurable (more bits + more hash functions = lower FPR).<br><br>
            <span class="highlight">Use cases in storage systems:</span><br>
            <strong>1. Cassandra / HBase:</strong> Each SSTable has a Bloom filter. On a read, check the Bloom filter first — if it says "no," skip that SSTable entirely, avoiding expensive disk I/O. This is critical for read performance with LSM trees.<br>
            <strong>2. CDN / Web caches:</strong> "Have we seen this URL before?" Bloom filter prevents caching one-hit-wonder URLs. <strong>Cache penetration prevention:</strong> Quick reject of requests for non-existent keys before hitting the DB.<br>
            <strong>3. Google Bigtable:</strong> Uses Bloom filters to avoid looking up non-existent rows/columns.<br>
            <strong>4. Database query optimization:</strong> Bloom filters for join operations — quickly eliminate rows that won't match before doing the full join.`
      },

        a: `The <strong>ELK stack</strong> (Elasticsearch, Logstash, Kibana) is the classic architecture:<br><br>

            <span class="highlight">2. Ingestion Buffer (Kafka):</span> Logs are published to Kafka topics partitioned by service or log type. Kafka acts as a <strong>shock absorber</strong> — decouples log producers from the indexing layer, enables replay, and handles backpressure. Retention: 1-7 days (enough to replay if indexing fails).<br>
            <span class="highlight">3. Indexing (Elasticsearch):</span> Consumers read from Kafka and bulk-index into Elasticsearch. Use <strong>time-based indices</strong> (e.g., <code>logs-2026-05-27</code>) for efficient retention management — delete old indices instead of expensive per-document deletes. Apply <strong>index templates</strong> for proper mapping (which fields are text vs. keyword, analyzed vs. not).<br>
            <span class="highlight">4. Query & Visualization (Kibana / Grafana):</span> Users search and visualize logs. Use <strong>index patterns</strong> to query across time-based indices. For frequent queries, create <strong>saved searches and dashboards</strong>.<br><br>
            <span class="highlight">Scale considerations:</span> <strong>Hot-warm-cold architecture:</strong> Recent logs (1-3 days) on fast SSDs (hot nodes), older logs on HDDs (warm), archived logs in object storage (cold, restorable). Use <strong>index lifecycle management</strong> to automate this. For very high volume (terabytes/day), consider <strong>sampling</strong> — index 100% of error logs but only 10% of debug logs.`

        q: 'What are the key considerations for designing a backup and disaster recovery strategy?',
        a: `A robust DR strategy is defined by <strong>RPO</strong> (Recovery Point Objective — how much data you can lose) and <strong>RTO</strong> (Recovery Time Objective — how fast you must recover).<br><br>
            <span class="highlight">Backup types:</span><br>
            <strong>1. Full backups:</strong> Complete copy of all data. Slow and storage-intensive but enables fastest restore. Done weekly.<br>
            <strong>2. Incremental backups:</strong> Only data changed since the last backup (full or incremental). Fast and storage-efficient, but restore requires the full backup + all incrementals (slower restore). Done daily/hourly.<br>
            <strong>3. Differential backups:</strong> Data changed since the last <em>full</em> backup. Faster restore than incremental (full + latest differential), but larger than incrementals.<br>
            <strong>4. Continuous backups (PITR):</strong> Database WAL archiving — enables point-in-time recovery to any second. Ship WAL files to object storage continuously. RPO can be near-zero.<br><br>
            <span class="highlight">DR strategies:</span><br>
            <strong>1. Backup & Restore:</strong> Cheapest. RTO: hours to days. RPO: hours. Restore from backups to new infrastructure.<br>
            <strong>2. Pilot Light:</strong> Minimal core services always running in DR region. Replicate data. Scale up during DR event. RTO: tens of minutes. RPO: minutes.<br>
            <strong>3. Warm Standby:</strong> Scaled-down but fully functional environment in DR region. RTO: minutes. RPO: seconds. More expensive.<br>
            <strong>4. Active-Active (Multi-Region):</strong> Both regions serve traffic. Instant failover. RTO: near-zero. RPO: near-zero. Most expensive but highest availability. Netflix runs active-active across multiple AWS regions.<br><br>
            <span class="highlight">Key practices:</span> Regularly <strong>test restores</strong> (Netflix's Chaos Monkey), encrypt backups, maintain <strong>immutable backups</strong> (protection against ransomware), document runbooks, and automate failover.`

        a: `In containerized environments (Kubernetes), service instances come and go dynamically (auto-scaling, rolling updates, node failures). <strong>Service discovery</strong> enables services to find each other without hardcoded IPs.<br><br>

            <span class="highlight">DNS-based discovery:</span> In Kubernetes, <code>my-service.namespace.svc.cluster.local</code> resolves to the ClusterIP of the service, which load-balances to pods. Simple and widely compatible.`

        q: 'What is the circuit breaker pattern and how do you implement it?',
        a: `A <strong>circuit breaker</strong> prevents cascading failures by detecting when a downstream service is failing and "opening the circuit" to fast-fail requests without calling the failing service. Named after electrical circuit breakers.<br><br>
            <span class="highlight">States:</span><br>
            <strong>CLOSED:</strong> Normal operation. Requests flow through. A failure counter tracks recent failures. If failures exceed a threshold within a time window (e.g., >50% failure rate in the last 10 seconds), transition to OPEN.<br>
            <strong>OPEN:</strong> Requests are immediately rejected with an error (fast-fail), without calling the downstream service. A timer starts. After a <strong>cooldown period</strong> (e.g., 30 seconds), transition to HALF-OPEN.<br>
            <strong>HALF-OPEN:</strong> A limited number of trial requests are allowed through. If they succeed, transition back to CLOSED (service recovered). If they fail, transition back to OPEN (service still down).<br><br>
            <span class="highlight">Implementation:</span> Use libraries like <strong>Resilience4j</strong> (Java), <strong>Polly</strong> (.NET), or <strong>Hystrix</strong> (deprecated but pioneering). In service mesh: <strong>Istio/Envoy</strong> can enforce circuit breaking at the proxy level without application code changes. Configure per-destination: max connections, max pending requests, max retries, detection thresholds. <strong>Combine with:</strong> Fallback responses (return cached data or default), retry with backoff, bulkheads (separate thread pools per dependency).`

        a: `<strong>Orchestration:</strong> A central coordinator (orchestrator) directs the interactions between services. The orchestrator sends commands to each service and handles the workflow logic. Like a conductor leading an orchestra. <strong>Pros:</strong> Explicit workflow visibility, easier to reason about, centralized error handling, simpler to test. <strong>Cons:</strong> Orchestrator becomes a critical dependency, services are more coupled to the orchestrator's API, potential bottleneck. Example: A "Place Order" saga orchestrator that calls Payment Service, then Inventory Service, then Shipping Service in sequence.<br><br>
            <strong>Choreography:</strong> Services communicate through events without a central coordinator. Each service reacts to events and publishes its own events. Like dancers improvising to the same music. <strong>Pros:</strong> Highly decoupled, no single point of failure, services are independently evolvable. <strong>Cons:</strong> Workflow is implicit (hard to see the big picture), cyclic dependencies risk, harder to implement compensating transactions. Example: Order Service publishes <code>OrderPlaced</code> → Payment Service listens, charges, publishes <code>PaymentCaptured</code> → Inventory Service listens, reserves stock.<br><br>
            <span class="highlight">When to use:</span> Use <strong>orchestration</strong> for complex, multi-step business processes with clear state machines (order fulfillment, user onboarding). Use <strong>choreography</strong> for loosely coupled event-driven flows (sending notifications, updating search indexes, analytics). Many systems use a <strong>hybrid</strong> — orchestration for core business flows, choreography for cross-cutting concerns.`

            <strong>3. Context propagation:</strong> The Trace ID and parent Span ID must be passed between services. This is done via HTTP headers: <code>X-Trace-Id</code>, <code>X-Span-Id</code>, <code>X-Parent-Span-Id</code> or the W3C standard <code>traceparent</code> header. Libraries auto-inject and extract these headers.<br><br>

            <span class="highlight">How it works (Stripe model):</span><br>
            <strong>1. Client generates:</strong> A unique key (UUID) for each distinct operation (e.g., creating a charge). Sends it in the <code>Idempotency-Key</code> header.<br>
            <strong>2. Server stores:</strong> On first request, the server processes the operation and stores the result keyed by the idempotency key in a durable store (database table or Redis with persistence). The response is returned to the client.<br>
            <strong>3. Retry:</strong> If the client retries with the same key (due to network timeout where the original response was lost), the server <strong>looks up the key</strong>, finds the cached result, and returns it <strong>without re-executing</strong> the operation. This is safe because the server knows the operation already succeeded.<br>
            <strong>4. Different operation, new key:</strong> If the client genuinely wants to perform a second operation (e.g., a second charge), it <strong>must</strong> use a new idempotency key. Reusing a key for a different payload should result in an error.<br><br>
            <span class="highlight">Implementation details:</span> Store idempotency keys with a TTL (24 hours is common — Stripe's default). The lookup must be atomic with the operation — use a DB transaction or Redis <code>SETNX</code>. Include a hash of the request body to detect key reuse with different payloads. This pattern is <strong>essential</strong> for any API that performs financial transactions or irreversible operations.`

            <strong>2. Header Versioning:</strong> Custom header: <code>X-API-Version: 2024-01-15</code> or <code>Accept-Version: v2</code>. <strong>Pros:</strong> Clean URLs, version is metadata. <strong>Cons:</strong> Harder to test (need to set headers), less discoverable, API gateway routing slightly more complex. Used by Azure API Management, some enterprise APIs.<br><br>

            <span class="highlight">Recommendation:</span> URL versioning for public APIs — it's the most developer-friendly. Use <strong>date-based versions</strong> (Stripe: <code>2023-08-16</code>) rather than sequential numbers — they convey when the API was released and avoid "v2 is better than v1" debates. <strong>Backward compatibility:</strong> Strive to make changes backward-compatible (additive only) to minimize version proliferation. Deprecate old versions with clear timelines (12+ months notice).`

        a: `In a microservices environment, you don't want every service to manage authentication independently. Use a <strong>centralized identity service</strong> with token-based auth.<br><br>
            <span class="highlight">Architecture:</span><br>
            <strong>1. Authentication (AuthN) at the gateway:</strong> The API Gateway validates credentials (username/password, OAuth, SSO) and issues a <strong>signed JWT</strong> (JSON Web Token) containing user identity and claims. The JWT is signed with a private key; services verify with the public key.<br>
            <strong>2. Token propagation:</strong> The JWT is passed in the <code>Authorization: Bearer &lt;token&gt;</code> header to all downstream services. Each service independently verifies the token signature and extracts user info — no need to call the auth service on every request (stateless validation).<br>
            <strong>3. Authorization (AuthZ):</strong> Services enforce permissions based on JWT claims (roles, scopes, permissions). For fine-grained authorization (e.g., "can user X access resource Y?"), use an <strong>authorization service</strong> (like OpenFGA, OPA, or custom) that evaluates policies. The service asks: "Can user 123 perform 'read' on 'document:456'?"<br>
            <strong>4. Service-to-service auth:</strong> Services calling each other need authentication too. Use <strong>mTLS</strong> (mutual TLS) — each service has a certificate, and both sides verify each other. In Kubernetes, service mesh (Istio/Linkerd) handles mTLS automatically. Alternatively, use <strong>service account tokens</strong> — a JWT issued to the service itself, not the end user.<br>
            <strong>5. Token refresh & revocation:</strong> JWTs are stateless — revocation is hard. Use <strong>short-lived access tokens</strong> (5-15 min) + <strong>longer-lived refresh tokens</strong>. Maintain a <strong>token blacklist</strong> in Redis for revoked tokens (checked on each request) — this makes validation stateful but enables instant revocation.`

        a: `99.99% ("four nines") = ~52 minutes downtime per year. Achieving this requires <strong>defense in depth</strong> across every layer.<br><br>
            <span class="highlight">Key strategies:</span><br>
            <strong>1. Redundancy:</strong> No single point of failure. Deploy across <strong>multiple availability zones</strong> (AZs) within a region. Critical services across <strong>multiple regions</strong>. Use load balancers with health checks to route around failures.<br>
            <strong>2. Automated failover:</strong> Database: primary-replica with automatic failover (RDS Multi-AZ, Patroni for PostgreSQL). DNS: health-check-based failover. Stateless services: auto-scaling replaces failed instances.<br>
            <strong>3. Fault isolation:</strong> Use bulkheads (separate thread pools, connection pools), circuit breakers, and retry with backoff. One failing component should not cascade.<br>
            <strong>4. Graceful degradation:</strong> If a dependency fails, serve degraded but functional responses (cached data, default recommendations). Feature flags to disable non-critical features under stress.<br>
            <strong>5. Blue-green / canary deployments:</strong> Deploy new versions alongside old versions, shift traffic gradually. If error rates spike, instantly roll back. This prevents deployment-induced outages (a major cause of downtime).<br>
            <strong>6. Observability & alerting:</strong> Monitor the <strong>Four Golden Signals</strong>: latency, traffic, errors, saturation. Alert on symptoms (high error rate) not causes (high CPU). Have runbooks for common failure scenarios.<br>
            <strong>7. Chaos engineering:</strong> Proactively test failure scenarios (Netflix's Chaos Monkey, Gremlin). If you don't test failover, it won't work when you need it.<br>
            <strong>8. SLA budgeting:</strong> If you have 52 min/year downtime budget, allocate it: 10 min for planned maintenance, 20 min for infrastructure failures, 22 min for application bugs. Track actual downtime against budget.`

        a: `These terms are often confused but are distinct:<br><br>
            <span class="highlight">Availability:</span> The percentage of time the system is operational and accessible. <strong>Measured as uptime:</strong> 99.9% = ~8.7h downtime/year. Focuses on <em>accessibility</em>. A system can be available but return incorrect results. Achieved through redundancy, load balancing, and failover.<br><br>
            <span class="highlight">Reliability:</span> The probability that the system will perform its intended function <strong>correctly</strong> for a specified period under specified conditions. Focuses on <em>correctness</em>. A reliable system produces the right results consistently. Measured by Mean Time Between Failures (MTBF). Achieved through testing, fault tolerance, error handling, and rigorous engineering practices.<br><br>
            <span class="highlight">Durability:</span> The guarantee that once data is written/committed, it will not be lost, even in the face of hardware failures. Focuses on <em>data preservation</em>. S3 offers 99.999999999% (11 9's) durability — if you store 10 million objects, you might lose one every 10,000 years. Achieved through replication, erasure coding, and geographically distributed storage.<br><br>
            <span class="highlight">Example:</span> A system can be highly available (always up) but unreliable (returns wrong calculations). A database can be durable (data never lost) but unavailable (cannot be accessed during failover). A system can be reliable (correct) but not durable (data lost if a disk fails). Good system design optimizes all three.`

        q: 'How do you implement rate limiting to prevent abuse and ensure fair usage?',
        a: `Rate limiting protects your system from abuse, controls costs, and ensures fair resource allocation.<br><br>
            <span class="highlight">Algorithms (detailed):</span><br>
            <strong>1. Token Bucket:</strong> A bucket holds tokens (max capacity). Tokens are added at a fixed rate. Each request consumes a token. If bucket is empty, request is rejected. <strong>Allows bursts</strong> up to bucket capacity. Best for most APIs — handles traffic spikes gracefully. Redis implementation: store <code>(tokens, last_refill_time)</code> per key; refill tokens on each request based on elapsed time.<br>
            <strong>2. Sliding Window Log:</strong> Track timestamps of all requests in a sorted set. Count requests in the window <code>[now - window, now]</code>. If count > limit, reject. <strong>Accurate</strong> but memory-intensive. Use Redis sorted sets with TTL-based cleanup.<br>
            <strong>3. Sliding Window Counter (approximate):</strong> Track counts in fixed windows + weight the previous window. Formula: <code>count = prev_window_count * (1 - elapsed/ window_duration) + current_window_count</code>. Very memory-efficient, good enough for most cases.<br><br>
            <span class="highlight">Deployment:</span> Implement at the <strong>API Gateway</strong> layer. Rate limit by: API key, user ID, IP address, or a combination. Use <strong>tiered limits</strong> (free: 100 req/min, pro: 1000 req/min). Return <strong>HTTP 429</strong> with <code>Retry-After</code> header. For distributed enforcement, use <strong>Redis</strong> as the shared counter store. Combine <strong>local rate limiting</strong> (in-memory, coarse) with <strong>global rate limiting</strong> (Redis, precise) for high throughput.`

        q: 'What is fault tolerance and how do you achieve it in a distributed system?',
        a: `<strong>Fault tolerance</strong> is the ability of a system to continue operating correctly in the event of component failures. In distributed systems, failures are <strong>inevitable</strong> — the question is how the system handles them.<br><br>
            <span class="highlight">Strategies:</span><br>
            <strong>1. Redundancy:</strong> Duplicate critical components. <strong>Active-active:</strong> All replicas serve traffic. <strong>Active-passive:</strong> One serves, others standby. <strong>N+1 redundancy:</strong> Have one more instance than needed for peak load.<br>
            <strong>2. Replication:</strong> Data replicated across nodes. Leader-follower for stateful services. Quorum-based for leaderless systems (Cassandra — write to 3 nodes, read from 2, tolerate 1 failure).<br>
            <strong>3. Health checking & auto-healing:</strong> Continuously monitor component health. Automatically restart failed processes (Kubernetes liveness probes), replace failed nodes (auto-scaling groups), and reroute traffic (load balancer health checks).<br>
            <strong>4. Graceful degradation:</strong> When some components fail, the system continues with reduced functionality. Circuit breakers, fallback responses, and feature flags enable this.<br>
            <strong>5. Retry with backoff:</strong> Transient failures (network blips, temporary overload) are retried. Exponential backoff + jitter prevents thundering herd on recovery.<br>
            <strong>6. Idempotency:</strong> Operations can be safely retried without side effects. Essential for fault tolerance in the presence of retries.<br>
            <strong>7. Chaos engineering:</strong> Deliberately inject failures to verify fault tolerance. Netflix's Chaos Monkey randomly terminates production instances. If your system can't handle this, it's not fault-tolerant.<br><br>
            <span class="highlight">CAP theorem reminder:</span> During a network partition, you must choose between consistency and availability. Fault-tolerant systems often choose availability (AP) with eventual consistency.`

            <span class="highlight">Methodology:</span><br>
            <strong>1. Define scenarios:</strong> Identify critical user journeys (login, search, checkout, video playback). Create test scripts that simulate realistic user behavior with think times and varied data.<br>

        a: `<strong>1. Blue-Green Deployment:</strong> Maintain two identical environments (blue = current live, green = new version). Deploy new version to green, run smoke tests, then <strong>switch all traffic</strong> at once (via load balancer or DNS). <strong>Pros:</strong> Instant rollback (switch back to blue), zero downtime, simple. <strong>Cons:</strong> Double the infrastructure cost during deployment, database schema migrations must be backward-compatible (both versions run simultaneously). Best for: critical applications where rollback speed matters.<br><br>
            <strong>2. Canary Deployment:</strong> Deploy new version alongside old, route a <strong>small percentage of traffic</strong> (e.g., 5%) to the new version. Monitor error rates and performance. Gradually increase traffic (5% → 25% → 50% → 100%) if metrics are healthy. <strong>Pros:</strong> Limit blast radius of bad deployments, test on real traffic. <strong>Cons:</strong> More complex routing, longer deployment time, requires sophisticated traffic management. Best for: large-scale systems where even 5% of users is a meaningful sample (Netflix, Google).<br><br>
            <strong>3. Rolling Deployment:</strong> Replace instances one at a time (or in small batches). Load balancer removes instance, new version is deployed, instance rejoins. Repeat until all instances are updated. <strong>Pros:</strong> No additional infrastructure, gradual rollout, simple to implement. <strong>Cons:</strong> Rollback is slow (must re-deploy old version instance by instance), mixed-version environment exists during deployment. Best for: standard Kubernetes deployments (default strategy).`

        q: 'How do you design a system to be resilient to network partitions?',
        a: `Network partitions (split-brain) are when parts of a distributed system cannot communicate with each other. The CAP theorem says you must choose between consistency and availability during a partition.<br><br>
            <span class="highlight">Strategies:</span><br>
            <strong>1. Choose AP or CP explicitly:</strong> For user-facing services, choose AP — remain available, serve possibly stale data, reconcile later. For financial ledgers, choose CP — reject writes that can't be confirmed by a quorum.<br>
            <strong>2. Quorum-based decisions:</strong> Use majority quorum for leader election and write confirmation. If a node is in the minority partition, it cannot elect itself leader or accept writes — preventing split-brain data corruption. etcd and Consul use Raft (majority-based).<br>
            <strong>3. Fencing tokens:</strong> When a leader is elected, it receives a monotonically increasing fencing token. All writes include this token. The storage layer rejects writes with outdated tokens. This prevents a partitioned ex-leader from corrupting data after a new leader is elected.<br>
            <strong>4. Lease-based locking:</strong> Locks have expiration (leases). If the lock holder is partitioned, the lock expires and another node can acquire it. Prevents infinite blocking due to unreachable lock holders.<br>
            <strong>5. Local-first operation:</strong> Design services to operate with local data during a partition. Queue writes locally (with conflict detection) and sync when the partition heals. CRDTs enable this pattern — they converge automatically without conflict resolution.<br>
            <strong>6. Anti-entropy protocols:</strong> After a partition heals, nodes exchange Merkle trees to identify differences and synchronize. Cassandra and Riak use this for eventual consistency across partitions.`
      },

            <strong>1. Service accounts & IAM:</strong> Each microservice gets its own service account with permissions scoped to exactly what it needs. Service A that reads from DynamoDB Table X should NOT have access to Table Y. Use cloud IAM roles with fine-grained policies.<br>
            <strong>2. Database access:</strong> Use separate DB users with granular permissions. The reporting service gets <code>SELECT</code> only on specific tables. The order service gets <code>INSERT, SELECT, UPDATE</code> on order tables but no access to user profile tables. Use <strong>row-level security</strong> for multi-tenant isolation.<br>
            <strong>3. Network segmentation:</strong> Use security groups / firewalls to restrict which services can talk to each other. A public-facing API should not have direct network access to the database — only through an internal service layer. Implement <strong>zero-trust networking</strong> — no implicit trust based on network location.<br>
            <strong>4. API scopes:</strong> OAuth scopes limit what a token can do. A third-party app might get <code>read:profile</code> but not <code>write:posts</code>. Users approve specific scopes during authorization.<br>

        q: 'What is synthetic monitoring and how does it complement real user monitoring (RUM)?',
        a: `<strong>Synthetic Monitoring (active monitoring):</strong> Simulated user traffic generated by scripts running from known locations at regular intervals (every 1-5 minutes). Tests critical user journeys: login → search → add to cart → checkout. <strong>Pros:</strong> Detects problems before real users are affected, provides consistent baseline, can test from multiple geographic locations, works even when there are zero real users. <strong>Cons:</strong> May not reflect real user behavior, limited coverage (only tested paths), doesn't capture edge cases. <strong>Tools:</strong> Pingdom, New Relic Synthetics, AWS CloudWatch Synthetics, Checkly.<br><br>
            <strong>Real User Monitoring (RUM - passive monitoring):</strong> Collects performance data from actual user sessions via JavaScript injected into the web page or SDK in mobile apps. Captures: page load time, time to interactive, AJAX call latency, JavaScript errors, user interactions. <strong>Pros:</strong> Reflects real user experience across all browsers, devices, and network conditions. Captures unexpected issues. <strong>Cons:</strong> Only detects problems after users are affected, noisy data, requires sufficient traffic for statistical significance. <strong>Tools:</strong> Datadog RUM, New Relic Browser, Elastic APM RUM, Google Web Vitals.<br><br>
            <span class="highlight">Complementary use:</span> Synthetic monitoring acts as an <strong>early warning system</strong> — it can detect that the checkout flow is broken before any real customer tries to check out. RUM provides <strong>depth and coverage</strong> — it shows that users on slow 3G in rural areas are having a bad experience. Together, they provide a complete picture of user experience.`
      },
      {
        id: 99,
        cat: 'Monitoring',
        q: 'How do you design a system to be debuggable and observable from day one?',
        a: `<strong>Observability</strong> must be built in, not bolted on. It's an architectural concern, not an afterthought.<br><br>
            <span class="highlight">Design principles:</span><br>
            <strong>1. Structured logging from the start:</strong> Every service emits JSON logs with trace_id, service_name, and key business context. Use a logging library that makes this the default. Configure log levels dynamically via feature flags.<br>
            <strong>2. Metrics for every endpoint:</strong> Automatically instrument all HTTP/gRPC endpoints with: request count, latency histogram, error count (by status code). Use a metrics library (Prometheus client, Micrometer) that does this with minimal code.<br>
            <strong>3. Distributed tracing built-in:</strong> Use OpenTelemetry auto-instrumentation agents. Every incoming request gets a trace ID; it's propagated to all downstream calls. Zero code changes for basic tracing.<br>
            <strong>4. Health check endpoints:</strong> Every service exposes <code>/health</code> (is the service running?) and <code>/ready</code> (can it serve traffic? DB connected? Dependencies healthy?). Kubernetes uses these for liveness and readiness probes.<br>
            <strong>5. Admin/debug endpoints:</strong> <code>/debug/pprof</code> (Go), thread dump (Java), config dump, feature flag state. These are invaluable during incidents. Protect them with authentication.<br>
            <strong>6. Correlation IDs in all user-facing responses:</strong> Return a <code>X-Request-Id</code> header. If a user reports an issue, they can provide this ID, and you can find all logs and traces for that exact request.<br>
            <strong>7. Error tracking:</strong> Integrate with Sentry or similar for automatic error aggregation, deduplication, and alerting on new error types. This catches bugs that metrics miss.`
      },
      {
        id: 100,
        cat: 'Monitoring',
        q: 'How do you conduct a blameless postmortem after a production incident?',
        a: `A <strong>blameless postmortem</strong> is a structured analysis of an incident focused on <strong>learning and improvement</strong>, not assigning blame. The goal: prevent recurrence, not punish individuals.<br><br>
            <span class="highlight">Process:</span><br>
            <strong>1. Timing:</strong> Schedule within 24-72 hours after the incident is resolved. Soon enough that details are fresh, but after the stress has subsided.<br>
            <strong>2. Participants:</strong> The incident responders, service owners, and a facilitator (someone not directly involved, to ensure objectivity). Optional: stakeholders who need to understand the impact.<br>
            <strong>3. Document structure:</strong><br>
            - <strong>Timeline:</strong> Minute-by-minute account of what happened, what actions were taken, and when. Based on logs, chat transcripts, and metrics.<br>
            - <strong>Impact:</strong> What was the user impact? How many users affected? Duration? Financial impact?<br>
            - <strong>Root Cause Analysis (5 Whys):</strong> Ask "why?" repeatedly until you reach the systemic root cause, not the proximate cause. "Why did the deploy fail? The script errored. Why? It assumed a file existed. Why? The build step didn't create it. Why? The build was skipped due to a caching bug." The root cause is the caching bug, not the engineer who deployed.<br>
            - <strong>Action items:</strong> Concrete, assigned, time-bound improvements. Each should address a systemic gap: automated tests, improved monitoring, better runbooks, safer deployment processes.<br>
            - <strong>Lessons learned:</strong> What went well? What surprised us? Where were we lucky?<br>
            <strong>4. Blameless culture:</strong> Assume good intent. Engineers don't come to work to break things. Focus on systemic safeguards: "How could the system have prevented this mistake?" rather than "Who made the mistake?" Share the postmortem broadly — transparency accelerates organizational learning.`
      }
    ];

    const qaList = document.getElementById('qaList');
    const searchInput = document.getElementById('searchInput');
    const noResults = document.getElementById('noResults');
    const visibleCount = document.getElementById('visibleCount');
    const catNav = document.getElementById('catNav');
    const backTop = document.getElementById('backTop');
    let activeCat = 'all';
    let openCardId = null;

    function renderQuestions(filterText = '', category = 'all') {
      const filtered = questions.filter(q => {
        const matchCat = category === 'all' || q.cat === category;
        const matchText = !filterText ||
          q.q.toLowerCase().includes(filterText.toLowerCase()) ||
          q.a.toLowerCase().includes(filterText.toLowerCase()) ||
          q.cat.toLowerCase().includes(filterText.toLowerCase());
        return matchCat && matchText;
      });

      qaList.innerHTML = filtered.map(q => `
            <div class="qa-card" data-id="${q.id}" data-cat="${q.cat}">
              <div class="qa-header" onclick="toggleCard(${q.id})">
                <div class="qa-num">${q.id}</div>
                <div class="qa-title-section">
                  <div class="qa-category">${q.cat}</div>
                  <div class="qa-question">${q.q}</div>
                </div>
                <div class="qa-arrow">▾</div>
              </div>
              <div class="qa-answer-wrap">
                <div class="qa-answer">${q.a}</div>
              </div>
            </div>
          `).join('');

      visibleCount.textContent = filtered.length;
      noResults.style.display = filtered.length === 0 ? 'block' : 'none';

      // Re-open previously open card if still visible
      if (openCardId && filtered.some(q => q.id === openCardId)) {
        const card = document.querySelector(`.qa-card[data-id="${openCardId}"]`);
        if (card) card.classList.add('open');
      }
    }

    window.toggleCard = function (id) {
      const card = document.querySelector(`.qa-card[data-id="${id}"]`);
      if (!card) return;
      const isOpen = card.classList.contains('open');

      // Close all other cards
      document.querySelectorAll('.qa-card.open').forEach(c => c.classList.remove('open'));

      if (!isOpen) {
        card.classList.add('open');
        openCardId = id;
        // Scroll into view smoothly
        setTimeout(() => {
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
      } else {
        openCardId = null;
      }
    };

    searchInput.addEventListener('input', () => {
      renderQuestions(searchInput.value.trim(), activeCat);
    });

    catNav.addEventListener('click', (e) => {
      if (e.target.classList.contains('cat-btn')) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        activeCat = e.target.dataset.cat;
        renderQuestions(searchInput.value.trim(), activeCat);
      }
    });

    // Scroll handling for back-to-top button and cat-nav shadow
    window.addEventListener('scroll', () => {
      backTop.classList.toggle('visible', window.scrollY > 600);
      catNav.classList.toggle('scrolled', window.scrollY > 50);
    });

    backTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Keyboard shortcut: Ctrl+K / Cmd+K to focus search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
      if (e.key === 'Escape') {
        searchInput.blur();
        document.querySelectorAll('.qa-card.open').forEach(c => c.classList.remove('open'));
        openCardId = null;
      }
    });

    // Initial render
    renderQuestions();
  </script>
</body>

</html>
