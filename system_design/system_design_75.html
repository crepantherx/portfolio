<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Interview — 75 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: #21262d;
    --accent: #f78166;
    --accent2: #58a6ff;
    --accent3: #3fb950;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --muted: #7d8590;
    --tag-bg: #1f2937;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 40px 32px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(247,129,102,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: 20%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(88,166,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .header-tag {
    display: inline-block;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(247,129,102,0.1);
    border: 1px solid rgba(247,129,102,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 12px;
  }
  h1 span { color: var(--accent); }
  .header-sub {
    color: var(--muted);
    font-size: 13px;
    max-width: 600px;
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .stat {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
  }
  .stat-num { color: var(--text); font-weight: 500; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* SEARCH + FILTER */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .controls-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 220px;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 16px;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent2); }
  input::placeholder { color: var(--muted); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* COUNTER */
  #result-count {
    font-size: 11px; color: var(--muted);
    margin-left: auto; white-space: nowrap;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  /* SECTION HEADER */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 40px 0 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: #30363d; }
  .q-card.open { border-color: var(--accent2); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }
  .q-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
  }
  .q-text {
    flex: 1;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .q-tags {
    display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px;
  }
  .tag {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid;
    font-weight: 400;
  }
  .tag-scale   { color: #58a6ff; border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.08); }
  .tag-storage { color: #3fb950; border-color: rgba(63,185,80,0.3);  background: rgba(63,185,80,0.08);  }
  .tag-upload  { color: #f78166; border-color: rgba(247,129,102,0.3); background: rgba(247,129,102,0.08); }
  .tag-cache   { color: #d2a8ff; border-color: rgba(210,168,255,0.3); background: rgba(210,168,255,0.08); }
  .tag-db      { color: #ffa657; border-color: rgba(255,166,87,0.3); background: rgba(255,166,87,0.08); }
  .tag-feed    { color: #ff7b72; border-color: rgba(255,123,114,0.3); background: rgba(255,123,114,0.08); }
  .tag-queue   { color: #79c0ff; border-color: rgba(121,192,255,0.3); background: rgba(121,192,255,0.08); }
  .tag-infra   { color: #56d364; border-color: rgba(86,211,100,0.3); background: rgba(86,211,100,0.08); }
  .tag-search  { color: #e3b341; border-color: rgba(227,179,65,0.3); background: rgba(227,179,65,0.08); }
  .tag-realtime{ color: #bc8cff; border-color: rgba(188,140,255,0.3); background: rgba(188,140,255,0.08);}
  .tag-security{ color: #f85149; border-color: rgba(248,81,73,0.3); background: rgba(248,81,73,0.08); }
  .tag-cdn     { color: #40d3f0; border-color: rgba(64,211,240,0.3); background: rgba(64,211,240,0.08); }

  .q-toggle {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.25s;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .q-card.open .q-toggle { transform: rotate(90deg); color: var(--accent2); }

  /* ANSWER */
  .q-answer {
    display: none;
    padding: 0 20px 20px 62px;
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
  .q-card.open .q-answer { display: block; }

  .q-answer p {
    color: #c9d1d9;
    font-size: 13px;
    line-height: 1.75;
    margin-bottom: 12px;
  }
  .q-answer strong { color: var(--accent); font-weight: 500; }
  .q-answer em { color: var(--accent2); font-style: normal; }

  .answer-block {
    background: var(--surface2);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin: 12px 0;
    font-size: 13px;
    color: #c9d1d9;
    line-height: 1.7;
  }
  .answer-block.warn { border-left-color: var(--accent); }
  .answer-block.success { border-left-color: var(--accent3); }
  .answer-block.purple { border-left-color: var(--accent4); }

  .answer-steps {
    counter-reset: step;
    margin: 12px 0;
  }
  .answer-steps li {
    counter-increment: step;
    display: flex; gap: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #c9d1d9;
    align-items: flex-start;
  }
  .answer-steps li::before {
    content: counter(step);
    min-width: 20px; height: 20px;
    background: rgba(88,166,255,0.15);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--accent2);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .answer-bullets { margin: 10px 0; padding-left: 0; list-style: none; }
  .answer-bullets li {
    display: flex; gap: 10px;
    color: #c9d1d9; font-size: 13px;
    margin-bottom: 6px;
    align-items: flex-start;
  }
  .answer-bullets li::before {
    content: '›';
    color: var(--accent3);
    font-size: 16px;
    line-height: 1.4;
    flex-shrink: 0;
  }

  .arch-diagram {
    background: #0a0f14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin: 12px 0;
    font-size: 12px;
    color: var(--muted);
    white-space: pre;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.6;
  }

  .kv-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 6px 16px;
    margin: 10px 0;
    font-size: 12.5px;
  }
  .kv-k { color: var(--accent4); }
  .kv-v { color: #c9d1d9; }

  /* NO RESULTS */
  #no-results {
    text-align: center;
    padding: 80px 20px;
    display: none;
    color: var(--muted);
  }
  #no-results p { font-size: 28px; margin-bottom: 8px; }
  #no-results span { font-size: 13px; }

  /* EXPAND ALL */
  .top-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-bottom: 16px;
  }
  .top-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    color: var(--muted);
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .top-btn:hover { color: var(--text); border-color: #30363d; }

  @media (max-width: 640px) {
    header, .controls { padding-left: 16px; padding-right: 16px; }
    main { padding: 24px 16px 60px; }
    .q-answer { padding-left: 20px; }
    .arch-diagram { font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-tag">Interview Prep</div>
    <h1>System Design<br><span>75 Questions</span></h1>
    <p class="header-sub">Senior / Staff engineer level questions with production-grade answers. Click any question to expand.</p>
    <div class="stats-bar">
      <div class="stat"><span class="stat-dot" style="background:#58a6ff"></span><span class="stat-num">75</span>&nbsp;questions</div>
      <div class="stat"><span class="stat-dot" style="background:#3fb950"></span><span class="stat-num">12</span>&nbsp;topic areas</div>
      <div class="stat"><span class="stat-dot" style="background:#f78166"></span>Senior / Staff level</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search questions…" oninput="filterAll()">
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('scale',this)">Scale</button>
      <button class="filter-btn" onclick="setFilter('upload',this)">Upload</button>
      <button class="filter-btn" onclick="setFilter('feed',this)">Feed/Social</button>
      <button class="filter-btn" onclick="setFilter('db',this)">DB/Storage</button>
      <button class="filter-btn" onclick="setFilter('cache',this)">Cache</button>
      <button class="filter-btn" onclick="setFilter('realtime',this)">Real-time</button>
      <button class="filter-btn" onclick="setFilter('queue',this)">Queue/Async</button>
      <button class="filter-btn" onclick="setFilter('search',this)">Search</button>
    </div>
    <div id="result-count">75 shown</div>
  </div>
</div>

<main>
  <div class="top-actions">
    <button class="top-btn" onclick="toggleAll(true)">Expand All</button>
    <button class="top-btn" onclick="toggleAll(false)">Collapse All</button>
  </div>
  <div id="questions-list"></div>
  <div id="no-results">
    <p>∅</p>
    <span>No questions match your filter.</span>
  </div>
</main>

<script>
const QA = [
  // ─── UPLOADS & FILES ──────────────────────────────────────────────
  {
    tags:["upload","scale","storage"],
    q:"How do you handle uploading a very large file (e.g., 10 GB video) reliably to a server?",
    a:`<p>Uploading a multi-gigabyte file in a single HTTP request is fragile — network drops restart the entire transfer. The industry standard is <strong>chunked / multipart upload</strong> combined with a <strong>resumable upload protocol</strong>.</p>
    <div class="answer-block">
      <strong>Phase 1 — Initiate:</strong> Client calls <em>POST /uploads</em> → server returns an <em>upload_id</em> and pre-signed URLs for each chunk (e.g., 5 MB chunks). Server records the session in Redis with TTL.
    </div>
    <ol class="answer-steps">
      <li>Split the file client-side into fixed-size chunks (5–8 MB is typical for S3 multipart).</li>
      <li>Upload each chunk in parallel (saturate the upload pipe). On failure, retry only the failed chunk using exponential backoff.</li>
      <li>Track progress in localStorage so the page refresh doesn't lose progress.</li>
      <li>Once all chunks land, send a <em>POST /uploads/{id}/complete</em> call. The backend calls <em>S3 CompleteMultipartUpload</em> which assembles the parts server-side.</li>
      <li>S3 runs a background integrity check (MD5/CRC32); you validate the ETag chain.</li>
    </ol>
    <div class="answer-block warn">
      <strong>Never</strong> expose your AWS credentials to the client. Use STS temporary pre-signed URLs or a Presigned POST that expires in 15 minutes.
    </div>
    <div class="kv-grid">
      <span class="kv-k">Storage</span><span class="kv-v">S3 / GCS with multipart API</span>
      <span class="kv-k">Chunk size</span><span class="kv-v">5–50 MB (S3 minimum is 5 MB per part)</span>
      <span class="kv-k">Parallelism</span><span class="kv-v">3–6 concurrent chunk uploads</span>
      <span class="kv-k">Resumability</span><span class="kv-v">TUS protocol (open standard) or custom cursor in Redis</span>
      <span class="kv-k">Post-upload</span><span class="kv-v">Trigger Lambda/Kafka event → transcode queue → CDN invalidation</span>
    </div>`
  },
  {
    tags:["upload","scale"],
    q:"How do you design a virus/malware scanning pipeline for user-uploaded files at scale?",
    a:`<p>Inline scanning blocks the upload thread and kills throughput. The pattern is <strong>async, quarantine-first</strong>.</p>
    <ol class="answer-steps">
      <li>File lands in a <strong>quarantine bucket</strong> (S3 with no public access, blocked from production reads).</li>
      <li>An S3 event fires a message onto an <em>SQS scan-queue</em>.</li>
      <li>A fleet of scanning workers (ClamAV + commercial AV SDK) pull from the queue. Workers are ephemeral VMs — each scans one file and terminates, preventing cross-contamination.</li>
      <li>Clean files are <em>moved</em> (server-side copy then delete) to the production bucket. Malicious files are archived to a forensics bucket and the upload is rejected.</li>
      <li>The uploader is notified via webhook / SSE.</li>
    </ol>
    <div class="answer-block">
      For very high volume, use multiple AV vendors (Defense-in-depth). Amazon GuardDuty Malware Protection or Trend Micro Cloud One can be inserted as a managed layer.
    </div>`
  },
  {
    tags:["upload","storage","scale"],
    q:"How does YouTube handle transcoding 500 hours of video uploaded every minute?",
    a:`<p>This is a classic <strong>fan-out + distributed task queue</strong> problem.</p>
    <div class="answer-block">
      Raw video lands in blob storage → a metadata record is created in Spanner → a job message is published to a priority queue (internal Pub/Sub clone).
    </div>
    <ul class="answer-bullets">
      <li><strong>Transcoding farm:</strong> Thousands of Borg (container) jobs pull tasks. Each job transcodes one resolution/codec variant (360p, 720p, 1080p, 4K, VP9, AV1) independently — fully parallelizable.</li>
      <li><strong>DAG scheduler:</strong> Dependencies are tracked in a DAG. 360p is produced first so the video becomes watchable within ~30 s of upload; higher resolutions follow asynchronously.</li>
      <li><strong>Storage:</strong> Each variant is stored in GCS, segmented into ~2 s MPEG-DASH or HLS chunks.</li>
      <li><strong>Thumbnails:</strong> FFmpeg extracts frames; a separate ML pipeline selects the best thumbnail.</li>
      <li><strong>CDN push:</strong> Once transcoded, segments are eagerly pushed to edge PoPs for popular content.</li>
    </ul>
    <div class="kv-grid">
      <span class="kv-k">Codec priority</span><span class="kv-v">AV1 > VP9 > H.264 (older clients fallback)</span>
      <span class="kv-k">ABR</span><span class="kv-v">DASH / HLS adaptive bitrate; client selects segment quality at runtime</span>
      <span class="kv-k">Dedup</span><span class="kv-v">Perceptual hash (SimHash) detects re-uploads before transcoding starts</span>
    </div>`
  },

  // ─── SCALE & TRAFFIC SPIKES ───────────────────────────────────────
  {
    tags:["scale","infra"],
    q:"How do you handle a sudden 100× traffic spike (e.g., a product goes viral or Black Friday)?",
    a:`<p>The core idea is <strong>elastic capacity + shedding bad load gracefully</strong>.</p>
    <ol class="answer-steps">
      <li><strong>Auto-scaling:</strong> Horizontal pod autoscaler (HPA) in k8s watches CPU/RPS metrics and spawns pods. Pre-warm capacity 15 min before known events using scheduled scaling.</li>
      <li><strong>Rate limiting at the edge:</strong> API Gateway / Nginx enforces per-user and per-IP token-bucket limits. This stops a single viral referral source from taking down the entire fleet.</li>
      <li><strong>Load shedding:</strong> When queue depth exceeds a threshold, return <em>503 Retry-After: 10</em> rather than queuing forever. Fail fast is better than cascading failure.</li>
      <li><strong>Static asset offload:</strong> All JS/CSS/images served from CDN — zero origin hits for assets.</li>
      <li><strong>Read replicas / caching:</strong> Under spike, 95 % of traffic is reads. A hot Redis layer absorbs database reads. Cache TTL tuned down to 30 s during the surge to prevent stale data.</li>
      <li><strong>Feature flags / graceful degradation:</strong> Non-essential features (recommendations, analytics) are turned off via LaunchDarkly to reserve capacity for core flows.</li>
      <li><strong>Circuit breakers:</strong> Hystrix/Resilience4j open circuits to slow downstream services, preventing thread pool exhaustion.</li>
    </ol>
    <div class="answer-block success">
      <strong>Key metric:</strong> Track p99 latency + error rate, NOT just average. A spike hides under averages and kills the tail.
    </div>`
  },
  {
    tags:["scale","infra","queue"],
    q:"Explain the difference between horizontal and vertical scaling, and when you'd pick each.",
    a:`<p><strong>Vertical scaling</strong> (scale-up) — give a single machine more CPU/RAM. Fast to do, no code changes, but hits hardware limits and creates a single point of failure. Useful for databases where sharding is operationally expensive (e.g., early-stage PostgreSQL).</p>
    <p><strong>Horizontal scaling</strong> (scale-out) — add more machines running the same service. Requires the service to be stateless (or externalize state to Redis/S3). Scales to arbitrary size, but introduces distributed systems complexity (consistency, network latency, service discovery).</p>
    <div class="answer-block">
      <strong>Rule of thumb:</strong> Stateless services (API servers, workers) → horizontal. Stateful singletons (primary DB, coordination services) → vertical first, then shard/replica when you hit limits.
    </div>
    <div class="kv-grid">
      <span class="kv-k">Web/API tier</span><span class="kv-v">Always horizontal — stateless, behind a load balancer</span>
      <span class="kv-k">Cache (Redis)</span><span class="kv-v">Horizontal via consistent hashing cluster</span>
      <span class="kv-k">OLTP DB</span><span class="kv-v">Vertical + read replicas → shard when write throughput saturates primary</span>
      <span class="kv-k">Batch workers</span><span class="kv-v">Horizontal — bursty, autoscale-friendly</span>
    </div>`
  },
  {
    tags:["scale","infra"],
    q:"How does Cloudflare absorb a 2 Tbps DDoS attack without going down?",
    a:`<p>DDoS protection at scale requires <strong>anycast routing + distributed scrubbing</strong>.</p>
    <ul class="answer-bullets">
      <li><strong>Anycast network:</strong> Cloudflare's 300+ PoPs all announce the same IP prefix. Attack traffic is automatically distributed globally — no single PoP receives the full volume.</li>
      <li><strong>BPF-based packet filtering:</strong> At each PoP, eBPF programs in the Linux kernel inspect and drop malicious packets at line rate (before user space). Drops happen at ~50 ns/packet.</li>
      <li><strong>Flow-based detection:</strong> Traffic baselines are computed per ASN; anomalies trigger automatic mitigation rules pushed to all PoPs within seconds.</li>
      <li><strong>Layer 7 challenge:</strong> For volumetric Layer 7 attacks, JS challenge / CAPTCHA is served from the edge, filtering bots before any origin hit.</li>
      <li><strong>Rate limit rules:</strong> Granular per-IP, per-ASN, per-country rate limiting deployed as firewall rules at the edge.</li>
    </ul>`
  },
  {
    tags:["scale","db"],
    q:"How does database connection pooling work and why is it critical at scale?",
    a:`<p>Each database connection consumes ~5–10 MB RAM on the DB server and a file descriptor. A service with 100 pods × 10 threads each would open 1,000 connections, exhausting PostgreSQL's default <em>max_connections = 100</em>.</p>
    <div class="answer-block">
      <strong>PgBouncer</strong> (for Postgres) sits between the app and DB. Apps connect to PgBouncer (cheap); it maintains a small pool (e.g., 20) of real DB connections and multiplexes.
    </div>
    <div class="kv-grid">
      <span class="kv-k">Session mode</span><span class="kv-v">1:1 mapping while session is active — safest, lowest density</span>
      <span class="kv-k">Transaction mode</span><span class="kv-v">Connection returned to pool after each transaction — highest density, but no SET/advisory locks</span>

    </div>

    a:`<p>Backpressure is the mechanism by which a downstream consumer signals to an upstream producer to slow down, preventing memory exhaustion and cascading failure.</p>
    <ul class="answer-bullets">
      <li><strong>Blocking queues:</strong> Producer blocks when the queue is full (e.g., Java's LinkedBlockingQueue).</li>
      <li><strong>Reactive Streams (Project Reactor / RxJava):</strong> Consumer requests N items via <em>request(N)</em>; producer emits at most N before waiting for another request signal.</li>
      <li><strong>Kafka consumer lag:</strong> If consumer lag grows, auto-scaling adds consumer pods. The lag metric IS the backpressure signal.</li>
      <li><strong>TCP flow control:</strong> The receiver's window size restricts how much the sender can buffer — OS-level backpressure.</li>
      <li><strong>HTTP 429 / 503:</strong> Returning retry-after headers tells the caller to back off at the API layer.</li>
    </ul>

    q:"When and how do you shard a database? What are the challenges?",
    a:`<p>Sharding (horizontal partitioning) splits data across multiple DB instances. You do it when a single node can no longer handle write throughput or dataset size.</p>
    <div class="answer-block warn">
      <strong>Don't shard prematurely.</strong> First: optimize queries, add indexes, add read replicas, use caching. Sharding is operationally expensive.

    <p><strong>Sharding strategies:</strong></p>
    <ul class="answer-bullets">
      <li><strong>Hash sharding:</strong> <em>shard = hash(userId) % N</em>. Evenly distributes rows. Problem: adding shards requires full rehash. Fix: consistent hashing.</li>
      <li><strong>Range sharding:</strong> Users A–M on shard 1, N–Z on shard 2. Simple to reason about, but hot spots form if range isn't uniform (e.g., all new signups have IDs in one range).</li>
      <li><strong>Directory sharding:</strong> A lookup table maps key → shard. Most flexible, but the directory itself becomes a bottleneck and single point of failure.</li>
    </ul>
    <p><strong>Key challenges:</strong></p>
    <ul class="answer-bullets">
      <li><strong>Cross-shard joins:</strong> Impossible in SQL — you must denormalize or do application-level joins.</li>
      <li><strong>Distributed transactions:</strong> 2PC across shards kills performance; prefer eventual consistency patterns.</li>
      <li><strong>Rebalancing:</strong> When you add a shard, migrating data live without downtime requires careful dual-write + backfill strategies.</li>
    </ul>`
  },

    q:"Explain the CAP theorem and how it affects your database choice.",
    a:`<p>CAP states that a distributed data store can guarantee at most two of: <strong>Consistency</strong> (reads always see the latest write), <strong>Availability</strong> (every request receives a response), and <strong>Partition tolerance</strong> (system works despite network partitions).</p>
    <p>In practice, network partitions happen — so the real choice is <strong>CP vs AP</strong> during a partition:</p>
    <div class="kv-grid">
      <span class="kv-k">CP systems</span><span class="kv-v">HBase, Zookeeper, etcd, Spanner — return error rather than stale data. Use for: financial ledgers, inventory counts, leader election.</span>
      <span class="kv-k">AP systems</span><span class="kv-v">Cassandra, DynamoDB, CouchDB — return stale data rather than error. Use for: social feeds, shopping carts, DNS.</span>

    q:"What is the difference between optimistic and pessimistic locking and when do you use each?",
    a:`<p><strong>Pessimistic locking</strong> acquires a lock before reading the row (<em>SELECT FOR UPDATE</em>). No other writer can touch it until the lock is released. Safe but serializes concurrent writers → throughput bottleneck.</p>
    <p><strong>Optimistic locking</strong> reads the row, holds a version number, does its work, then at write time checks: <em>"is version still what I read?"</em> If yes, commit and increment version. If no, retry.</p>
    <div class="kv-grid">
      <span class="kv-k">Pessimistic: use when</span><span class="kv-v">High contention, write conflicts are frequent (e.g., airline seat booking), short-lived transactions</span>
      <span class="kv-k">Optimistic: use when</span><span class="kv-v">Low contention, read-heavy (99% reads, 1% writes), long-running reads (would hold lock too long)</span>
    </div>
    <div class="answer-block">

  {
    tags:["db","storage"],
    q:"How does Cassandra achieve high write throughput and what are the trade-offs?",
    a:`<p>Cassandra is optimized for <strong>write-heavy workloads</strong> by making writes cheap and deferring work to compaction.</p>
    <ol class="answer-steps">
      <li><strong>Commit Log (WAL):</strong> Every write is appended to a sequential commit log first — sequential I/O is 100× faster than random I/O.</li>
      <li><strong>Memtable:</strong> Data is also written to an in-memory sorted structure (Memtable). No disk read needed for write.</li>
      <li><strong>SSTable flush:</strong> When Memtable is full, it's flushed to an immutable SSTable on disk. Multiple SSTables accumulate.</li>
      <li><strong>Compaction:</strong> Background process merges SSTables, discards tombstones, produces a new sorted SSTable. This is the deferred "cost" of cheap writes.</li>
    </ol>
    <div class="kv-grid">
      <span class="kv-k">Tunable consistency</span><span class="kv-v">Write with QUORUM (W + R > N = strong), or ONE (eventually consistent)</span>
      <span class="kv-k">Trade-offs</span><span class="kv-v">Read amplification (must read multiple SSTables + Bloom filter), no joins, no transactions, tombstone accumulation can hurt reads</span>
      <span class="kv-k">Best for</span><span class="kv-v">Append-heavy: IoT, user activity logs, message stores, time-series</span>
    </div>`

  {
    tags:["cache","db","scale"],
    q:"Explain cache invalidation strategies. When does cache become a liability?",
    a:`<p>Cache invalidation is famously one of the hardest problems in CS. The strategies are:</p>
    <div class="kv-grid">
      <span class="kv-k">TTL (time-to-live)</span><span class="kv-v">Cache expires automatically after N seconds. Simple, but stale window is fixed. Works well for content that changes slowly.</span>
      <span class="kv-k">Write-through</span><span class="kv-v">Write to cache AND DB synchronously on every mutation. Cache is always fresh, but writes are slower.</span>
      <span class="kv-k">Write-behind</span><span class="kv-v">Write to cache, async flush to DB. Fast writes, but risk data loss if cache crashes before flush.</span>
      <span class="kv-k">Cache-aside (lazy)</span><span class="kv-v">App checks cache first; on miss, loads from DB and populates cache. Most common. Problem: thundering herd on cold start.</span>
      <span class="kv-k">Event-driven invalidation</span><span class="kv-v">DB triggers or Debezium CDC publishes change events → consumers delete/update affected cache keys. Precise but complex.</span>
    </div>
    <div class="answer-block warn">
      Cache becomes a liability when: (1) You store mutable financial data with no invalidation → wrong balances shown. (2) Multiple services write to shared data without coordinated invalidation. (3) <strong>Cache stampede:</strong> a TTL expires on a hot key → 10k concurrent requests miss → all hit DB simultaneously → DB crashes.
    </div>
    <p><strong>Stampede prevention:</strong> Mutex lock (only one request rebuilds; others wait), probabilistic early expiration (refresh before TTL expires), or background refresh.</p>`
  },

    a:`<p>Redis Cluster uses <strong>hash slots</strong> — the key space is divided into 16,384 slots. Each slot is assigned to a node. <em>HASH_SLOT = CRC16(key) % 16384</em>.</p>

  {
    tags:["queue","scale","realtime"],
    q:"How does Kafka achieve high throughput and durability simultaneously?",
    a:`<p>Kafka's design is deceptively simple: it's essentially a <strong>distributed, replicated, partitioned write-ahead log</strong>.</p>
    <ul class="answer-bullets">
      <li><strong>Sequential I/O:</strong> Producers append to a partition log sequentially. Sequential disk writes on modern SSDs do 500–1,000 MB/s vs ~100 MB/s random. Kafka writes are near raw-disk speed.</li>
      <li><strong>Zero-copy:</strong> <em>sendfile()</em> syscall transfers data from page cache directly to the network socket, bypassing user space entirely. This eliminates 2 memory copies per message delivery.</li>

      <span class="kv-k">Throughput</span><span class="kv-v">LinkedIn benchmarked 2M writes/second on 3-node cluster</span>
      <span class="kv-k">Durability</span><span class="kv-v">min.insync.replicas=2 + acks=all ensures 0 data loss even during broker crash</span>
    </div>`

    a:`<p>Messaging systems offer three delivery semantics:</p>

      <span class="kv-k">At-least-once</span><span class="kv-v">Retry on failure. Messages delivered ≥1 time. Duplicates possible. Requires idempotent consumers.</span>
      <span class="kv-k">Exactly-once</span><span class="kv-v">Each message processed exactly once. Expensive. Requires coordination.</span>
    </div>
    <p><strong>Kafka's exactly-once (Kafka Streams / transactions):</strong></p>
    <ol class="answer-steps">

  // ─── SEARCH ───────────────────────────────────────────────────────
  {
    tags:["search","scale"],
    q:"How does Elasticsearch handle full-text search at scale? What is an inverted index?",
    a:`<p>An <strong>inverted index</strong> maps each unique word (term) to the list of documents that contain it — the inverse of a forward index (document → words).</p>
    <div class="arch-diagram">  Term      → Document IDs
  ─────────────────────────
  "payment" → [doc1, doc5, doc9]
  "failed"  → [doc1, doc3, doc9]
  "error"   → [doc2, doc3, doc5]</div>
    <p>To search <em>"payment failed"</em>: intersect the two posting lists → {doc1, doc9}. This is a set intersection on sorted arrays — extremely fast.</p>
    <ul class="answer-bullets">
      <li><strong>Elasticsearch index = collection of shards.</strong> Each shard is a Lucene index. Queries fan out to all shards in parallel; results are merged and re-ranked.</li>
      <li><strong>TF-IDF / BM25 scoring:</strong> Documents are ranked by how often the term appears (TF) vs how rare the term is globally (IDF). BM25 adds length normalization.</li>
      <li><strong>Near-real-time indexing:</strong> New documents are added to an in-memory segment; they become searchable in ~1 s when the segment is flushed (refresh). Segments are periodically merged.</li>
      <li><strong>Scaling:</strong> Read replicas absorb search traffic. Write-heavy clusters use dedicated indexing nodes. Index lifecycle management (ILM) tiers old indices to cold storage.</li>
    </ul>`
  },

    a:`<p>A CDN is a distributed network of edge servers (PoPs) that cache content close to end users, reducing latency and origin server load.</p>

      — Low-latency writes (CDN is for reads)<br>
      — Data that must be consistent in real time (medical records, inventory counts)
    </div>

    tags:["infra","scale","db"],
    q:"Explain the write-ahead log (WAL) and why it's fundamental to database reliability.",
    a:`<p>The WAL principle: <strong>log changes before applying them to the actual data pages</strong>. This ensures durability and enables recovery.</p>
    <ol class="answer-steps">
      <li>Transaction begins. Changes are written to the sequential WAL file first (fast, sequential I/O).</li>
      <li>WAL is flushed to disk (fsync). At this point the transaction is considered durable.</li>
      <li>The transaction commits — client receives ACK.</li>
      <li>Data pages in the buffer pool are modified. These are flushed to disk lazily (dirty page flushing).</li>
    </ol>
    <div class="answer-block">
      On crash recovery, Postgres replays the WAL from the last checkpoint. Any transaction whose WAL was flushed but data pages weren't is re-applied. Transactions without a WAL entry are rolled back.
    </div>
    <p>WAL is also used for <strong>replication</strong>: the replica streams the primary's WAL and replays it, keeping in sync. This is logical replication. WAL thus serves triple duty: crash recovery + durability + replication.</p>`
  },

  {
    tags:["scale","db","queue"],
    q:"What is the two-phase commit (2PC) and why do modern systems avoid it?",
    a:`<p>2PC is a protocol for atomic distributed transactions across multiple participants (e.g., two databases).</p>
    <ol class="answer-steps">
      <li><strong>Phase 1 (Prepare):</strong> Coordinator asks all participants: "Can you commit?" Each participant writes to its WAL and responds Yes/No.</li>
      <li><strong>Phase 2 (Commit):</strong> If all said Yes → coordinator sends Commit to all. If any said No → coordinator sends Abort to all.</li>
    </ol>
    <div class="answer-block warn">
      <strong>Why it's avoided:</strong><br>
      — <strong>Blocking:</strong> If coordinator crashes after Phase 1, participants are stuck holding locks indefinitely — the system is unavailable.<br>
      — <strong>Latency:</strong> 2 network round-trips with synchronous responses.<br>
      — <strong>Scalability:</strong> All participants must be available simultaneously.<br>
    </div>
    <p><strong>Modern alternative — Saga pattern:</strong> Break the distributed transaction into a sequence of local transactions. If one fails, execute compensating transactions to undo previous steps. Eventually consistent, but no global locking.</p>`
  },

    tags:["scale","db"],
    q:"What is eventual consistency and how do you handle it in a user-facing product?",
    a:`<p>In an eventually consistent system, after a write, reads from different replicas may return stale data for a brief window. The system guarantees that <em>eventually</em> (usually milliseconds to seconds) all replicas converge.</p>
    <p><strong>UX strategies to hide inconsistency:</strong></p>
    <ul class="answer-bullets">
      <li><strong>Read-your-own-writes:</strong> Route the user's reads to the replica that received their write (sticky routing by user ID). They never see their own stale data.</li>
      <li><strong>Optimistic UI:</strong> Show the user's action immediately in the UI without waiting for server confirmation. If the server later rejects it, undo and show an error. Used by Gmail (send button), Twitter (like button).</li>
      <li><strong>Monotonic reads:</strong> Guarantee that a user never sees a state older than what they previously saw. Use version vectors or timestamps to skip stale replicas.</li>
      <li><strong>Hide with design:</strong> "Like count may be approximate" or "comment count updates in real time" — honest labeling.</li>
    </ul>`
  },

    q:"How does consistent hashing work and why is it used in distributed caches?",
    a:`<p>In simple modular hashing (<em>key % N</em>), adding or removing one node remaps <em>N-1/N ≈ 83%</em> of keys — a cache stampede disaster.</p>
    <p><strong>Consistent hashing</strong> maps both keys and nodes onto a virtual ring (0 to 2^32). A key is assigned to the first node clockwise from its position on the ring.</p>
    <ul class="answer-bullets">
      <li>Adding a node: only keys between the new node and its predecessor are remapped — ~1/N of keys (just the "slice" it takes over).</li>
      <li>Removing a node: only that node's keys move to the next node clockwise.</li>
      <li><strong>Virtual nodes (vnodes):</strong> Each physical node is represented by K virtual positions on the ring (e.g., K=150). This ensures keys are uniformly distributed even with heterogeneous node capacities. Used by Cassandra and DynamoDB.</li>
    </ul>
    <div class="answer-block success">
      Consistent hashing is why Cassandra can add nodes without downtime and DynamoDB rebalances seamlessly — only 1/N of data moves.
    </div>`
  },
  {
    tags:["scale","db","infra"],
    q:"How do you design for zero-downtime database schema migrations?",
    a:`<p>Changing a production DB schema with millions of rows and live traffic without downtime requires an <strong>expand-contract (parallel change) pattern</strong>.</p>
    <ol class="answer-steps">
      <li><strong>Expand:</strong> Add the new column/table as nullable or alongside the old one. Both old and new code can run simultaneously. Deploy new code that writes to BOTH old and new columns.</li>
      <li><strong>Backfill:</strong> Batch-migrate existing rows in small chunks (1,000 rows per batch) with sleep between batches to avoid locking. Use a background job, not a single ALTER TABLE.</li>
      <li><strong>Verify:</strong> Run in dual-write mode until new column is 100% backfilled and validated.</li>
      <li><strong>Contract:</strong> Deploy code that reads only from the new column. Remove writes to old column. Finally, DROP the old column in a separate migration.</li>
    </ol>
    <div class="answer-block warn">
      <em>ALTER TABLE ADD COLUMN NOT NULL DEFAULT</em> on PostgreSQL &lt;11 rewrites the entire table and holds an exclusive lock. In PG11+, it's instant for static defaults. Use <em>pglogical</em> or <em>pt-online-schema-change</em> for large tables on older versions.

    a:`<p>File sync is fundamentally a <strong>conflict resolution + delta sync problem</strong>.</p>

    q:"How would you design a distributed key-value store from scratch (like DynamoDB)?",
    a:`<p>This is the canonical distributed systems design question. The components are: <strong>consistent hashing ring + replication + quorum + gossip + anti-entropy</strong>.</p>
    <ul class="answer-bullets">
      <li><strong>Data distribution:</strong> Consistent hashing ring. Each node owns a range of the ring. Virtual nodes (vnodes) for uniform distribution.</li>
      <li><strong>Replication:</strong> Each key is stored on N=3 nodes (the key's primary node + next 2 clockwise). Replication is asynchronous.</li>
      <li><strong>Quorum reads/writes:</strong> W + R > N for strong consistency. W=2, R=2, N=3 is the typical setting. Or W=1, R=1 for maximum availability.</li>
      <li><strong>Gossip protocol:</strong> Nodes exchange state with random neighbors every second. Cluster membership knowledge propagates in O(log N) rounds without a central coordinator.</li>
      <li><strong>Anti-entropy:</strong> Merkle trees detect data divergence between replicas. Only divergent subtrees are synchronized — efficient repair.</li>
      <li><strong>Conflict resolution:</strong> Vector clocks track causality. On read, if two versions are concurrent (not causally related), surface both to the application for resolution.</li>

    q:"How do you design a system to handle a 'thundering herd' problem?",
    a:`<p>A thundering herd occurs when many processes wake up simultaneously to compete for a shared resource — e.g., a cache key expiring causes 10,000 threads to simultaneously query the DB.</p>
    <p><strong>Solutions:</strong></p>
    <ul class="answer-bullets">
      <li><strong>Cache locking (mutex):</strong> Only one thread is allowed to rebuild the cache; others block and wait. Use Redis SET NX (atomic lock). After rebuild, release lock. Reduces DB load from N to 1.</li>
      <li><strong>Probabilistic early expiration:</strong> Before TTL expires, each request has a probability of early refresh proportional to how close the TTL is. Prevents simultaneous expiry.</li>
      <li><strong>Background refresh:</strong> A separate thread always refreshes the cache 10 s before expiry. Readers always get a valid (if slightly stale) value.</li>
      <li><strong>Jitter on TTL:</strong> Instead of TTL=3600s for all objects, use TTL = 3600 + random(0, 600). Spreads expirations over 10 minutes instead of all at once.</li>
      <li><strong>Request coalescing:</strong> A request dedup layer ensures that N simultaneous requests for the same resource result in only 1 DB query. The 1 response is fanned out to all N waiters.</li>
    </ul>`

    a:`<p><strong>CQRS (Command Query Responsibility Segregation):</strong> Separate the write model (commands: create, update, delete) from the read model (queries: fetch, search). Different data stores, schemas, and scaling strategies for each.</p>

      Traditional: accounts table with balance column (mutable state).<br>

    q:"How do you implement distributed locking correctly?",
    a:`<p>Distributed locking is deceptively hard — simple Redis SETNX implementations have dangerous edge cases.</p>
    <ul class="answer-bullets">
      <li><strong>Naive SETNX:</strong> <em>SET key NX EX 30</em>. Works most of the time. Failure mode: process acquires lock, pauses (GC pause, swap), lock expires, second process acquires lock, first process wakes and assumes it still holds lock → both hold the lock.</li>
      <li><strong>Fencing tokens:</strong> Lock service returns a monotonically increasing token. When writing to a resource, include the token. Resource rejects writes with an older token than previously seen. Makes lock expiry safe.</li>
      <li><strong>Redlock (Redis):</strong> Acquire lock on majority (3 of 5) independent Redis nodes within a time window. Safer than single-node, but Martin Kleppmann's critique: still unsafe with clock jumps or GC pauses without fencing tokens.</li>
      <li><strong>Correct solution:</strong> Use a CP lock service: Zookeeper ephemeral nodes (lock released automatically on client disconnect), or etcd leases. These provide proper sequential guarantees.</li>
    </ul>
    <div class="answer-block warn">
      For anything where correctness truly matters (payments, inventory), use database-level locking (SELECT FOR UPDATE) or Zookeeper/etcd — not Redis-based locks alone.
    </div>`

    a:`<p>Schema evolution is one of the hardest operational challenges in event-driven systems. The rule: <strong>producers and consumers evolve independently</strong>.</p>

    q:"How do you handle database failover without data loss or prolonged downtime?",
    a:`<p>The key variables are <strong>RPO</strong> (Recovery Point Objective — how much data you can lose) and <strong>RTO</strong> (Recovery Time Objective — how long can you be down).</p>
    <ul class="answer-bullets">
      <li><strong>Synchronous replication:</strong> Write is only acknowledged after all replicas confirm. RPO = 0 (zero data loss), but increases write latency by ~1 round trip to the replica. Used by: financial systems, Google Spanner.</li>
      <li><strong>Asynchronous replication:</strong> Write is acknowledged immediately; replicas catch up in background. Lower write latency, but RPO can be seconds (whatever was in-flight). Used by: most MySQL setups, Postgres streaming replication.</li>
      <li><strong>Automatic failover:</strong> AWS RDS Multi-AZ uses synchronous standby. On primary failure, RDS promotes the standby and updates the DNS CNAME within 60–120 s (RTO ~2 min). Aurora: RTO &lt;30 s.</li>
      <li><strong>ProxySQL / HAProxy:</strong> Sits between app and DB. On primary failure, detects via health check and routes connections to the new primary without app restart.</li>
      <li><strong>Application-level handling:</strong> Implement connection retry with exponential backoff. Writes during failover window return errors — clients must retry idempotently.</li>
    </ul>`

      <li>Client sends operation to server with a revision number (Lamport timestamp).</li>
      <li>Server transforms the operation against any concurrent operations and broadcasts to all connected clients.</li>
      <li>Clients apply the server-confirmed operation. Document state converges.</li>
    </ol>
    <div class="answer-block">
      For cursors and presence (seeing where others are typing), a separate lightweight WebSocket channel broadcasts cursor positions every 100 ms independently of the document operations.
    </div>`

    q:"How would you design a search engine for e-commerce (product search with facets and filters)?",

    q:"How do you approach capacity planning for a new service expected to handle 1M DAU?",
    a:`<p>Capacity planning is about translating business metrics into infrastructure requirements through a chain of assumptions.</p>
    <ol class="answer-steps">
      <li><strong>Establish usage profile:</strong> 1M DAU, avg 10 API calls/session, avg session 5 min → 10M API calls/day ÷ 86,400 s = ~116 RPS average. Peak is typically 3–5× average → ~500 RPS peak.</li>
      <li><strong>Latency budget:</strong> Target p99 &lt;200ms. Load test to find max RPS per instance at that SLA. If a single instance handles 50 RPS at p99 &lt;200ms → need 10 instances for peak + 30% headroom = 14 instances.</li>
      <li><strong>Storage:</strong> Estimate row size × rows/day × retention period. 1M DAU × 10 events × 100 bytes = 1 GB/day. 90-day retention = 90 GB. Add 3× for indexes and overhead = 270 GB.</li>
      <li><strong>Database connections:</strong> 14 app instances × 10 connection pool size = 140 connections. Postgres default is 100 — add PgBouncer.</li>
      <li><strong>Bandwidth:</strong> 500 RPS × avg 5 KB response = 2.5 MB/s egress. Trivial for most cloud providers.</li>
    </ol>
    <div class="answer-block success">
      Always add 30–50% headroom above peak estimates. Monitor actual usage and auto-scale. Review capacity quarterly.
    </div>`

      <li><strong>FPGA / kernel bypass:</strong> Top exchanges (NYSE, NASDAQ) run matching engines on FPGAs or use DPDK (kernel-bypass networking) to eliminate OS network stack overhead. Network-to-match: &lt;10 microseconds.</li>
      <li><strong>Colocation:</strong> High-frequency traders physically locate their servers in the same datacenter as the exchange to minimize the speed-of-light delay. 1ms of round-trip ≈ 300km distance.</li>
      <li><strong>Persistence:</strong> The order book is serialized to a WAL asynchronously. On crash, replay from the WAL to reconstruct the book. The matching itself never waits for disk I/O.</li>
      <li><strong>Market data distribution:</strong> Executed trades are published to a multicast feed. Thousands of subscribers receive the same update simultaneously without unicast overhead.</li>

    a:`<ul class="answer-bullets">

      <li><strong>Secrets manager:</strong> AWS Secrets Manager or HashiCorp Vault. Secrets are versioned, audited (every read is logged), and automatically rotated. Applications fetch secrets at startup via IAM role — no hardcoded credentials.</li>
      <li><strong>IAM roles / Workload Identity:</strong> In AWS/GCP, services authenticate to other services via IAM roles, not static credentials. The cloud provider issues short-lived tokens. No long-lived credentials exist.</li>
      <li><strong>Envelope encryption:</strong> Secrets Manager encrypts secrets with a CMK (Customer Master Key) in KMS. To decrypt, the service needs both IAM access to the secret AND to the KMS key — two independent permission checks.</li>
      <li><strong>Rotation:</strong> Rotate DB passwords every 90 days automatically. When rotation happens, Secrets Manager updates the secret and the DB simultaneously. Applications using the cached old secret get a 401 → retry with the new secret.</li>

    q:"How would you design a system like Airbnb's search (geo-search + filters + availability)?",
    a:`<p>Airbnb search combines geospatial, faceted, and availability constraints — no single data store handles all three optimally.</p>

    q:"How do you build a system that can process streaming data and handle late-arriving events?",
    a:`<p>In streaming systems, events can arrive out of order due to network delays, retries, or clock skew. Processing them correctly requires <strong>watermarks and windowing</strong>.</p>
    <ul class="answer-bullets">
      <li><strong>Event time vs processing time:</strong> Always use event timestamp (when it happened), not processing time (when it arrived). An event from a phone that was offline for 10 min arrives late but should be counted in the correct window.</li>
      <li><strong>Watermarks (Apache Flink/Beam):</strong> The system tracks the maximum event timestamp seen minus a configurable lag (e.g., 5 min). Events older than the watermark are considered "late". This allows 5 minutes for straggling events to arrive.</li>
      <li><strong>Window strategies:</strong> Tumbling windows (fixed, non-overlapping), sliding windows (overlapping), session windows (gap-based). Results are emitted when the watermark passes the window's end time.</li>
      <li><strong>Late event handling:</strong> Events arriving after the watermark can be: dropped, reprocessed into the window if allowed lateness &gt; 0, or sent to a side output for separate handling.</li>
      <li><strong>Exactly-once semantics:</strong> Flink uses distributed snapshots (Chandy-Lamport algorithm) to checkpoint state. On failure, state is restored from the latest checkpoint and Kafka offsets rewound.</li>
    </ul>`

    q:"How do you design a data warehouse that can run analytical queries over petabytes of data?",
    a:`<p>OLAP (analytical) queries are fundamentally different from OLTP — they scan billions of rows, not retrieve single rows by key.</p>
    <ul class="answer-bullets">
      <li><strong>Columnar storage:</strong> BigQuery, Redshift, Snowflake store data by column, not row. A query on 3 of 50 columns reads only 6% of the data. Massive I/O reduction. Columnar data also compresses 10–100× better (similar values in a column).</li>
      <li><strong>Massively parallel processing (MPP):</strong> A query is compiled to a distributed execution plan. Each compute node processes a shard of data in parallel. BigQuery spins up 2,000 worker slots for a large query in seconds.</li>

      <li><strong>Materialized views / pre-aggregation:</strong> Commonly-run aggregations (daily revenue by country) are pre-computed and stored. Queries hit the materialized view instead of scanning raw data.</li>
      <li><strong>Data lake architecture:</strong> Raw data in S3 (Parquet format). Transformation with dbt. Curated tables in Redshift/BigQuery. Athena for ad-hoc queries on S3 without loading.</li>

    q:"What is the difference between a load balancer and a reverse proxy? How does layer 4 vs layer 7 load balancing differ?",
    a:`<p>A <strong>reverse proxy</strong> sits in front of servers and forwards requests on their behalf. A <strong>load balancer</strong> distributes traffic across multiple servers. In practice, most load balancers are also reverse proxies (Nginx, HAProxy, AWS ALB).</p>
    <div class="kv-grid">
      <span class="kv-k">L4 (TCP/UDP) LB</span><span class="kv-v">Routes based on IP + port. Does NOT inspect HTTP headers or content. Extremely fast (kernel-level, no HTTP parsing). Use for: non-HTTP protocols, UDP (DNS, games), when raw throughput matters. Examples: AWS NLB, LVS.</span>
      <span class="kv-k">L7 (HTTP) LB</span><span class="kv-v">Parses HTTP. Can route based on URL path, hostname, cookies, headers. Enables: path-based routing (/api → service A, /images → service B), SSL termination, session affinity (sticky sessions via cookie), health checks on HTTP endpoints. Examples: AWS ALB, Nginx, HAProxy.</span>

    <div class="answer-block">

    tags:["scale","queue","infra"],
    q:"How do you design an outbox pattern to guarantee message delivery between a database and a message broker?",
    a:`<p>The classic dual-write problem: you update the DB AND send a Kafka message. If the app crashes between the two, they're out of sync.</p>
    <div class="answer-block warn">
      <strong>Wrong:</strong> UPDATE db → send Kafka message. If crash happens between → DB updated, message never sent (or vice versa).
    </div>
    <div class="answer-block success">
      <strong>Correct (Outbox Pattern):</strong><br>
      1. In the SAME transaction: UPDATE business table + INSERT into outbox table (event payload, status=PENDING).<br>
      2. A separate relay process reads PENDING outbox rows and publishes to Kafka.<br>
      3. On successful Kafka ACK, mark outbox row as PROCESSED.<br>
      The relay uses CDC (Debezium watching the DB WAL) or polling (SELECT ... WHERE status=PENDING LIMIT 100).
    </div>
    <p>The transaction guarantees that both the business record and the outbox entry are written or neither is. The relay provides at-least-once delivery to Kafka. Consumers must be idempotent (deduplicate by event ID).</p>`

    a:`<p>Multi-tenancy means multiple customers share infrastructure while being isolated from each other. Three common patterns:</p>
    <div class="kv-grid">

      <span class="kv-k">Pool model</span><span class="kv-v">All tenants share one DB. tenant_id column in every table. Cheapest, best resource utilization. Risk: noisy neighbor (one tenant's queries slow everyone's). Requires row-level security (PostgreSQL RLS) to prevent data leakage.</span>
      <span class="kv-k">Bridge model</span><span class="kv-v">Shared DB with separate schemas per tenant. Isolation via schema-level permissions. Easier migrations per tenant. Scales to ~10,000 tenants in PostgreSQL before connection overhead becomes an issue.</span>
    </div>

    a:`<p>When content varies by user (logged-in state, preferences, A/B group), traditional CDN caching fails. Modern approaches bring logic to the edge.</p>
    <ul class="answer-bullets">
      <li><strong>Edge computing (Cloudflare Workers, Lambda@Edge):</strong> JavaScript runs at the CDN PoP. The function can read the user's cookie, look up their profile from a nearby data store, and personalize the response — all at the edge without an origin round-trip.</li>
      <li><strong>Partial caching (ESI — Edge Side Includes):</strong> The page is split into fragments. Static fragments (nav, footer) are cached at the edge. Dynamic fragments (user greeting, personalized recommendations) are fetched from origin and assembled at the edge. Reduces origin load even if the full page isn't cacheable.</li>
      <li><strong>Vary header:</strong> Cache different versions of a response per header value (e.g., Vary: Accept-Language caches one version per language). Works for small numbers of variants; impractical for per-user personalization.</li>
      <li><strong>Cache key enrichment:</strong> Normalize the cache key to include only the segment-relevant attributes (e.g., user_tier=premium, ab_group=B) rather than the full user ID. Reduces the cache key space from N users to K segments.</li>
    </ul>`

    tags:["scale","storage","db"],
    q:"How do you design backup and disaster recovery for a critical production database?",
    a:`<p>Backup strategy is defined by <strong>RPO</strong> (how much data loss is acceptable) and <strong>RTO</strong> (how fast must you recover).</p>
    <ul class="answer-bullets">
      <li><strong>Continuous WAL archiving:</strong> PostgreSQL streams WAL to S3 in real time (pg_basebackup + WAL-E / pgBackRest). Recovery from any point in time (PITR) within the retention window. RPO = 0 for most practical purposes.</li>
      <li><strong>Automated snapshots:</strong> Daily RDS snapshots retained for 35 days. Snapshot = consistent backup without locking (uses copy-on-write). Restore to a new instance in ~10–30 min (RTO).</li>
      <li><strong>Cross-region replication:</strong> Snapshots replicated to a secondary region. In a regional disaster (entire AWS region down), restore from the secondary region. RTO: 30–60 min typically.</li>
      <li><strong>Regular restore tests:</strong> A backup never tested is not a backup. Automate weekly restore-and-validate jobs: restore latest snapshot to a test instance, run integrity queries, compare row counts with production.</li>
      <li><strong>Read replica as DR standby:</strong> A read replica in another region can be promoted to primary in ~60 s for fast failover. It lags behind the primary by seconds (async replication) — RPO is seconds.</li>
    </ul>`

      <li><strong>Ingest:</strong> Events → Kafka. Event schema: {user_id, event_type, timestamp, properties}.</li>

      <li><strong>Dashboard query:</strong> Dashboard API reads from Redis for the last 60 seconds (60 keys per metric). Aggregates in the API layer for 1-min / 5-min / 1-hour views by summing multiple Redis entries.</li>

    </ol>
    <div class="answer-block">
      Apache Druid or ClickHouse can serve both the streaming ingestion and sub-second analytical query tier, potentially replacing steps 2–4 with a single system. Used by Airbnb, Lyft, and Netflix for internal analytics.
    </div>`

// ─── RENDER ──────────────────────────────────────────────────────────
let currentFilter = 'all';

function renderQuestions(list) {
  const container = document.getElementById('questions-list');
  const noResults = document.getElementById('no-results');
  document.getElementById('result-count').textContent = `${list.length} shown`;
  if (list.length === 0) {
    container.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  container.innerHTML = list.map((q, i) => `
    <div class="q-card" id="qcard-${i}" onclick="toggleCard(${i})">
      <div class="q-header">
        <div class="q-num">${String(i+1).padStart(2,'0')}</div>
        <div class="q-meta">
          <div class="q-text">${q.q}</div>
          <div class="q-tags">${q.tags.map(t=>`<span class="tag tag-${t}">${t}</span>`).join('')}</div>
        </div>
        <div class="q-toggle">›</div>
      </div>
      <div class="q-answer">${q.a}</div>
    </div>
  `).join('');
}

function toggleCard(i) {
  const card = document.getElementById(`qcard-${i}`);
  card.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.q-card').forEach(c => {
    if (open) c.classList.add('open');
    else c.classList.remove('open');
  });
}

function setFilter(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}

function filterAll() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = QA.map((item, origIdx) => ({...item, origIdx}));
  if (currentFilter !== 'all') {
    list = list.filter(item => item.tags.includes(currentFilter));
  }
  if (q) {
    list = list.filter(item =>
      item.q.toLowerCase().includes(q) ||
      item.tags.some(t => t.includes(q))
    );
  }
  // Re-index for display
  renderQuestions(list);
}

// Initial render
renderQuestions(QA.map((item, i) => ({...item, origIdx: i})));
</script>
